<script>
  // ==========================================
  // 選択チップ (Choice Chips) コンポーネントの定義
  // ==========================================
  class ChoiceChips {
    constructor(containerId, hiddenInputId, isMultiSelect = false, onChangeCallback) {
      this.container = document.getElementById(containerId);
      this.hiddenInput = document.getElementById(hiddenInputId);
      this.isMultiSelect = isMultiSelect;
      this.onChange = onChangeCallback;
      this.options = [];
      this.selectedValues = []; // 複数選択用の配列
    }
    
    setOptions(options) {
      this.options = options;
      this.render();
    }
    
    render() {
      this.container.innerHTML = '';
      
      this.options.forEach(opt => {
        const chip = document.createElement('div');
        chip.className = 'choice-chip';
        chip.textContent = opt;
        
        // 初期選択状態の判定
        const isSelected = this.isMultiSelect 
          ? this.selectedValues.includes(opt)
          : this.hiddenInput.value === opt;
          
        if (isSelected) {
          chip.classList.add('selected');
        }
        
        chip.addEventListener('click', () => {
          this.select(opt);
        });
        
        this.container.appendChild(chip);
      });
    }
    
    select(value) {
      if (this.isMultiSelect) {
        // 複数選択モード
        const idx = this.selectedValues.indexOf(value);
        if (idx > -1) {
          this.selectedValues.splice(idx, 1); // 選択解除
        } else {
          this.selectedValues.push(value); // 新規選択
        }
        this.hiddenInput.value = this.selectedValues.join(',');
      } else {
        // 単一選択モード
        this.hiddenInput.value = value;
      }
      
      // UIの選択表示を同期
      this.container.querySelectorAll('.choice-chip').forEach(chip => {
        const isSel = this.isMultiSelect
          ? this.selectedValues.includes(chip.textContent)
          : this.hiddenInput.value === chip.textContent;
          
        if (isSel) {
          chip.classList.add('selected');
        } else {
          chip.classList.remove('selected');
        }
      });
      
      if (this.onChange) {
        this.onChange(this.getValue());
      }
    }
    
    getValue() {
      return this.isMultiSelect ? this.selectedValues.join(',') : this.hiddenInput.value;
    }
    
    setValue(value) {
      this.hiddenInput.value = value || '';
      if (this.isMultiSelect) {
        this.selectedValues = value ? value.split(',') : [];
      }
      this.render();
    }
  }

  // ==========================================
  // アプリケーションの状態管理
  // ==========================================
  let currentMonth = "";
  let currentYear = new Date().getFullYear();
  let appData = null;
  let yearlyData = null;
  let categoryChart = null;
  let yearlyTrendChart = null;
  let yearlyCategoryChart = null;

  // 取引履歴フィルターの状態管理
  let activeFilters = {
    categories: [],
    paidBy: []
  };
  let filterCategoryChips = null;
  let filterPaidByChips = null;

  // ==========================================
  // セッションストレージキャッシュ＆暗号化管理
  // ==========================================
  let clientDbLastUpdated = null;
  let isInitialLoad = true;

  // ==========================================
  // アプリケーションデバッグログ管理 (AppLogger)
  // ==========================================
  const AppLogger = {
    logs: [],
    isDebugMode: false,
    isUiRendered: false,
    
    init() {
      // 1. 同期判定：iframe の URL からパラメータを直接確認 (最速・フォールバック用)
      try {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('debug') === 'true') {
          console.log("[AppLogger] Sync parameter check: debug=true detected.");
          this.enableDebugMode();
          return;
        }
      } catch (e) {
        console.warn("Failed to check iframe URL parameters: " + e.message);
      }

      // 2. 非同期判定：親ウィンドウ（親URL）のパラメータをGASの標準APIで確認
      try {
        if (typeof google !== "undefined" && google.script && google.script.url) {
          const self = this;
          google.script.url.getLocation(function(location) {
            if (location.parameter.debug === "true" || location.parameter.debug === true) {
              console.log("[AppLogger] Async parameter check: debug=true detected.");
              self.enableDebugMode();
            }
          });
        }
      } catch (e) {
        console.warn("Failed to check URL parameters for debug mode: " + e.message);
      }
    },
    
    enableDebugMode() {
      this.isDebugMode = true;
      console.log("[AppLogger] enableDebugMode called. isUiRendered=" + this.isUiRendered);
      
      const panel = document.getElementById("debug-console-panel");
      if (panel) {
        panel.style.display = "flex";
        this.isUiRendered = true;
        console.log("[AppLogger] Debug panel set to display: flex successfully.");
        
        // それまでに蓄積されていたログを遡ってUIにレンダリングする
        const container = document.getElementById("debug-log-container");
        if (container) {
          container.innerHTML = "";
          this.logs.forEach(entry => this.appendLogToUI(entry));
          console.log(`[AppLogger] Rendered ${this.logs.length} buffered logs to UI.`);
        } else {
          console.warn("[AppLogger] debug-log-container element not found in DOM.");
        }
        lucide.createIcons();
      } else {
        console.warn("[AppLogger] debug-console-panel element not found in DOM yet. Retrying in 500ms...");
        // DOM構築が未完了の場合に備えて、500ms後に再試行する
        const self = this;
        setTimeout(() => {
          self.enableDebugMode();
        }, 500);
      }
      
      // 初回有効化ログを出力（二重表示を防ぐためにisUiRenderedが切り替わったときのみ）
      if (this.isUiRendered && !this.logs.some(l => l.message === "デバッグモードが有効化されました。")) {
        this.log("SYSTEM", "デバッグモードが有効化されました。");
      }
    },
    
    log(category, message, details = null) {
      const logEntry = {
        id: Math.random().toString(36).substring(2, 11),
        timestamp: new Date(),
        category: category.toUpperCase(), // API, DATABASE, UI, IMPORT, ERROR, SYSTEM
        message: message,
        details: details ? (typeof details === 'object' ? JSON.stringify(details) : String(details)) : null
      };
      
      this.logs.push(logEntry);
      
      // デバッグモードの時のみブラウザ開発者ツールとUIパネルに出力する
      if (this.isDebugMode) {
        const colors = {
          API: "color: #3399ff",
          DATABASE: "color: #33cc66",
          UI: "color: #ffaa66",
          IMPORT: "color: #b366ff",
          ERROR: "color: #ff6666; font-weight: bold;",
          SYSTEM: "color: #e0e0e0; font-style: italic;"
        };
        console.log(`%c[${logEntry.category}] ${message}`, colors[logEntry.category] || "", details || "");
        this.appendLogToUI(logEntry);
      }
    },
    
    appendLogToUI(entry) {
      const container = document.getElementById("debug-log-container");
      if (!container) return;
      
      const row = document.createElement("div");
      row.className = `debug-row log-category-${entry.category.toLowerCase()}`;
      row.setAttribute("data-category", entry.category);
      
      const timeStr = entry.timestamp.toTimeString().split(' ')[0] + '.' + String(entry.timestamp.getMilliseconds()).padStart(3, '0');
      
      let detailsHtml = "";
      if (entry.details) {
        detailsHtml = `<span class="debug-details" title="${escapeHtml(entry.details)}">(${escapeHtml(entry.details.substring(0, 100))}${entry.details.length > 100 ? '...' : ''})</span>`;
      }
      
      row.innerHTML = `
        <span class="debug-time">${timeStr}</span>
        <span class="debug-badge debug-badge-${entry.category.toLowerCase()}">${entry.category}</span>
        <span class="debug-msg">${escapeHtml(entry.message)}</span>
        ${detailsHtml}
      `;
      
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
      
      const countBadge = document.getElementById("debug-log-count");
      if (countBadge) {
        countBadge.textContent = this.logs.length;
      }
    },
    
    getFormattedLogs() {
      return this.logs.map(l => {
        const timeStr = l.timestamp.toISOString();
        return `[${timeStr}] [${l.category}] ${l.message}${l.details ? ' | Details: ' + l.details : ''}`;
      }).join('\n');
    }
  };

  // デバッグUI用ヘルパー関数
  function filterDebugLogs() {
    const filter = document.getElementById("debug-filter-category").value;
    const container = document.getElementById("debug-log-container");
    if (!container) return;
    
    const rows = container.querySelectorAll(".debug-row");
    rows.forEach(row => {
      const cat = row.getAttribute("data-category");
      if (filter === "ALL" || cat === filter) {
        row.style.display = "flex";
      } else {
        row.style.display = "none";
      }
    });
    
    const countBadge = document.getElementById("debug-log-count");
    if (countBadge) {
      if (filter === "ALL") {
        countBadge.textContent = AppLogger.logs.length;
      } else {
        const visibleCount = container.querySelectorAll(`.debug-row[data-category="${filter}"]`).length;
        countBadge.textContent = `${visibleCount}/${AppLogger.logs.length}`;
      }
    }
  }

  function toggleDebugConsole() {
    const panel = document.getElementById("debug-console-panel");
    const toggleIcon = document.getElementById("debug-toggle-icon");
    if (!panel) return;
    
    const isCollapsed = panel.classList.toggle("collapsed");
    if (toggleIcon) {
      if (isCollapsed) {
        toggleIcon.setAttribute("data-lucide", "chevrons-up");
      } else {
        toggleIcon.setAttribute("data-lucide", "chevrons-down");
      }
      lucide.createIcons();
    }
  }

  function clearDebugLogs() {
    AppLogger.logs = [];
    const container = document.getElementById("debug-log-container");
    if (container) container.innerHTML = "";
    const countBadge = document.getElementById("debug-log-count");
    if (countBadge) countBadge.textContent = "0";
    AppLogger.log("SYSTEM", "ログがクリアされました。");
  }

  function copyDebugLogs() {
    const text = AppLogger.getFormattedLogs();
    navigator.clipboard.writeText(text).then(() => {
      const copyIcon = document.getElementById("debug-copy-icon");
      const copyBtn = document.getElementById("debug-copy-btn");
      
      if (copyBtn) copyBtn.setAttribute("title", "コピー完了！");
      if (copyIcon) {
        copyIcon.setAttribute("data-lucide", "check");
        lucide.createIcons();
      }
      
      setTimeout(() => {
        if (copyBtn) copyBtn.setAttribute("title", "ログをコピー");
        if (copyIcon) {
          copyIcon.setAttribute("data-lucide", "copy");
          lucide.createIcons();
        }
      }, 2000);
    }).catch(err => {
      alert("コピーに失敗しました: " + err.message);
    });
  }

  window.filterDebugLogs = filterDebugLogs;
  window.toggleDebugConsole = toggleDebugConsole;
  window.clearDebugLogs = clearDebugLogs;
  window.copyDebugLogs = copyDebugLogs;

  const CACHE_STORAGE_KEY = "_hk_ledger_app_cache";
  const FALLBACK_ENCRYPT_KEY = "hk_ledger_fallback_secure_key_2026";
  let activePrefetchMonth = null; // 現在プリフェッチ実行中の月
  let prefetchPendingMonth = null; // ユーザーが切り替え待ちしている月
  let prefetchSuccessCallback = null; // 切り替え待ち月のロード完了時のコールバック

  // Gemini API キーを取得する（暗号化用）
  function getEncryptionKey() {
    try {
      const obfuscated = localStorage.getItem("_hk_session_data");
      if (obfuscated) {
        const reversed = obfuscated.split("").reverse().join("");
        return atob(reversed);
      }
    } catch (e) {
      console.warn("Failed to get API key for encryption: " + e.message);
    }
    return FALLBACK_ENCRYPT_KEY;
  }

  // CryptoJS を使用した暗号化
  function encryptData(data) {
    try {
      const key = getEncryptionKey();
      return CryptoJS.AES.encrypt(JSON.stringify(data), key).toString();
    } catch (e) {
      console.error("Encryption failed: " + e.message);
      return null;
    }
  }

  // CryptoJS を使用した復号
  function decryptData(ciphertext) {
    try {
      const key = getEncryptionKey();
      const bytes = CryptoJS.AES.decrypt(ciphertext, key);
      const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
      if (!decryptedText) return null;
      return JSON.parse(decryptedText);
    } catch (e) {
      console.warn("Decryption failed: " + e.message);
      return null;
    }
  }

  // セッションストレージからキャッシュを取得する
  function getCacheFromStorage() {
    try {
      const encrypted = sessionStorage.getItem(CACHE_STORAGE_KEY);
      if (encrypted) {
        const decrypted = decryptData(encrypted);
        if (decrypted) {
          if (!decrypted.cache) decrypted.cache = {};
          if (!decrypted.yearlyCache) decrypted.yearlyCache = {};
          return decrypted;
        }
      }
    } catch (e) {
      console.warn("Failed to read cache from storage: " + e.message);
    }
    return { clientDbLastUpdated: null, cache: {}, yearlyCache: {} };
  }

  // セッションストレージにキャッシュを保存する
  function saveCacheToStorage(cacheObj) {
    try {
      const encrypted = encryptData(cacheObj);
      if (encrypted) {
        sessionStorage.setItem(CACHE_STORAGE_KEY, encrypted);
      }
    } catch (e) {
      console.warn("Failed to write cache to storage: " + e.message);
    }
  }

  // タイムスタンプをデバッグ用に読みやすい時刻に変換する
  function formatTimestamp(ts) {
    if (!ts) return "なし";
    const num = parseInt(ts);
    if (isNaN(num)) return ts;
    const d = new Date(num);
    const timeStr = ("0" + d.getHours()).slice(-2) + ":" + 
                    ("0" + d.getMinutes()).slice(-2) + ":" + 
                    ("0" + d.getSeconds()).slice(-2) + "." + 
                    ("00" + (num % 1000)).slice(-3);
    return timeStr;
  }

  // 単一の月次データをキャッシュに登録する
  function saveMonthDataToCache(monthStr, responseData) {
    AppLogger.log("DATABASE", `${monthStr} のデータをローカルキャッシュに保存します。`, { timestamp: responseData.dbLastUpdated });
    const cacheObj = getCacheFromStorage();
    if (responseData.dbLastUpdated) {
      clientDbLastUpdated = responseData.dbLastUpdated;
      cacheObj.clientDbLastUpdated = responseData.dbLastUpdated;
    }
    cacheObj.cache[monthStr] = {
      data: responseData,
      timestamp: responseData.dbLastUpdated || clientDbLastUpdated
    };
    saveCacheToStorage(cacheObj);
  }

  // 単一の年間データをキャッシュに登録する
  function saveYearlyDataToCache(yearStr, responseData) {
    AppLogger.log("DATABASE", `${yearStr}年の年間データをローカルキャッシュに保存します。`, { timestamp: responseData.dbLastUpdated });
    const cacheObj = getCacheFromStorage();
    if (responseData.dbLastUpdated) {
      clientDbLastUpdated = responseData.dbLastUpdated;
      cacheObj.clientDbLastUpdated = responseData.dbLastUpdated;
    }
    cacheObj.yearlyCache[yearStr] = {
      data: responseData,
      timestamp: responseData.dbLastUpdated || clientDbLastUpdated
    };
    saveCacheToStorage(cacheObj);
  }

  // 全キャッシュの破棄
  function clearAllCache() {
    AppLogger.log("DATABASE", "すべてのローカルキャッシュを破棄（クリア）しました。");
    sessionStorage.removeItem(CACHE_STORAGE_KEY);
  }

  // 同期アニメーションの開始
  function startSyncAnimation(mode) {
    const syncBtn = document.getElementById('sync-btn');
    if (syncBtn) {
      syncBtn.dataset.pendingStop = 'false';
      syncBtn.classList.add(mode); // 'loading' または 'syncing'
      if (mode === 'loading') {
        syncBtn.disabled = true;
      }
    }
  }

  // 同期アニメーションの停止要求
  function stopSyncAnimation() {
    const syncBtn = document.getElementById('sync-btn');
    if (syncBtn) {
      // もしアニメーションが実行中でなければ、即座に状態をクリアする
      if (!syncBtn.classList.contains('loading') && !syncBtn.classList.contains('syncing')) {
        syncBtn.disabled = false;
        syncBtn.dataset.pendingStop = 'false';
        return;
      }
      // アニメーション実行中の場合は、フラグを立てて次の animationiteration で止まるようにする
      syncBtn.dataset.pendingStop = 'true';
    }
  }

  // 手動同期処理 (強制リフレッシュ)
  function forceSync() {
    startSyncAnimation('loading');
    showTableLoading(true);
    
    // サーバー側のタイムスタンプを強制更新
    google.script.run
      .withSuccessHandler(function(newTimestamp) {
        clientDbLastUpdated = newTimestamp;
        clearAllCache(); // キャッシュを完全に破棄
        
        // 最新データを再取得
        loadData();
        
        stopSyncAnimation();
      })
      .withFailureHandler(function(err) {
        console.error("手動同期に失敗しました: ", err);
        showTableLoading(false);
        stopSyncAnimation();
        alert("データの同期に失敗しました。");
      })
      .forceSyncDatabaseTimestamp();
  }

  // ==========================================
  // テーマ管理ロジック
  // ==========================================
  let currentTheme = localStorage.getItem('theme') || 'system';

  function getChartThemeColors() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark' || 
                   (!document.documentElement.getAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
    
    return {
      text: isDark ? '#eaeaea' : '#37352f',
      grid: isDark ? 'rgba(255, 255, 255, 0.03)' : 'rgba(55, 53, 47, 0.05)',
      cardBg: isDark ? '#202020' : '#ffffff',
      emptyBg: isDark ? '#2b2b2b' : '#e0e0e0'
    };
  }

  function applyTheme(theme) {
    currentTheme = theme;
    localStorage.setItem('theme', theme);
    
    const root = document.documentElement;
    if (theme === 'system') {
      root.removeAttribute('data-theme');
    } else {
      root.setAttribute('data-theme', theme);
    }
    
    // アイコンの切替
    const iconMap = {
      system: 'monitor',
      light: 'sun',
      dark: 'moon'
    };
    const iconName = iconMap[theme] || 'monitor';
    const themeIcon = document.getElementById('theme-icon');
    if (themeIcon) {
      themeIcon.setAttribute('data-lucide', iconName);
      if (window.lucide) {
        window.lucide.createIcons();
      }
    }
    
    // セレクトボックスの選択状態を同期
    const themeSelect = document.getElementById('settings-theme');
    if (themeSelect) {
      themeSelect.value = theme;
    }
    
    // グラフの再描画
    if (appData) {
      updateChart(appData.analysis.categoryTotals);
    }
    if (yearlyData) {
      updateYearlyCharts(yearlyData);
    }
  }

  function cycleTheme() {
    const nextThemeMap = {
      system: 'light',
      light: 'dark',
      dark: 'system'
    };
    const nextTheme = nextThemeMap[currentTheme] || 'system';
    applyTheme(nextTheme);
  }

  // システムのテーマ変更検知
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (currentTheme === 'system') {
      applyTheme('system');
    }
  });

  // 選択チップのインスタンス変数
  let selectCategory;
  let selectPaidBy;
  let selectSplitType;
  let selectBeneficiaries;

  // ==========================================
  // 日付スライダーUIの制御ロジック
  // ==========================================
  
  function formatDateISO(date) {
    const y = date.getFullYear();
    const m = ("0" + (date.getMonth() + 1)).slice(-2);
    const d = ("0" + date.getDate()).slice(-2);
    return `${y}-${m}-${d}`;
  }

  let oldestLoadedDate = new Date();
  let calCurrentYear = new Date().getFullYear();
  let calCurrentMonth = new Date().getMonth();
  let settleCalCurrentYear = new Date().getFullYear();
  let settleCalCurrentMonth = new Date().getMonth();

  function generateDateSlider() {
    const slider = document.getElementById("date-slider");
    slider.innerHTML = "";
    
    // 今日から30日間をロード
    oldestLoadedDate = new Date();
    appendDatesToSlider(30);
    
    // スクリューイベント監視
    slider.addEventListener("scroll", () => {
      // 一番右端（過去）に近づいたらさらにロード
      if (slider.scrollWidth - slider.scrollLeft - slider.clientWidth < 100) {
        appendDatesToSlider(30);
      }
    });
  }

  function appendDatesToSlider(daysCount) {
    const slider = document.getElementById("date-slider");
    const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
    
    for (let i = 0; i < daysCount; i++) {
      const d = new Date(oldestLoadedDate);
      if (slider.children.length > 0) {
        d.setDate(d.getDate() - 1);
      }
      oldestLoadedDate = d;
      
      const dateStr = formatDateISO(d);
      const month = d.getMonth() + 1;
      const day = d.getDate();
      const wday = d.getDay(); // 0:日, 6:土
      
      const card = document.createElement("div");
      card.className = "date-card";
      card.setAttribute("data-date", dateStr);
      
      let wdayClass = "";
      if (wday === 6) wdayClass = "date-card-sat";
      else if (wday === 0) wdayClass = "date-card-sun";
      
      card.innerHTML = `
        <span class="date-card-month">${month}月</span>
        <span class="date-card-day">${("0" + day).slice(-2)}</span>
        <span class="date-card-weekday ${wdayClass}">${weekdays[wday]}</span>
      `;
      
      card.addEventListener("click", () => {
        document.getElementById("tx-date").value = dateStr;
        selectDate(dateStr, false);
      });
      
      slider.appendChild(card);
    }
  }

  function selectDate(dateStr, triggerScroll = true) {
    const str = String(dateStr);
    const targetDate = new Date(str.replace(/-/g, "/"));
    
    // もし選択された日付が、現在読み込まれている最古の日付よりも過去の場合
    // その日付が含まれるまで追加ロードする
    if (targetDate < oldestLoadedDate) {
      const diffTime = oldestLoadedDate - targetDate;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 5;
      appendDatesToSlider(diffDays);
    }
    
    const today = new Date();
    const todayZero = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
    const cards = document.querySelectorAll(".date-card");
    let found = false;
    
    cards.forEach(card => {
      const cardDateStr = card.getAttribute("data-date");
      const cardDate = new Date(cardDateStr.replace(/-/g, "/"));
      
      // 選択されておらず、かつ今日より未来の日付カードは削除する
      if (cardDate.getTime() > todayZero && cardDateStr !== dateStr) {
        card.remove();
        return;
      }

      if (cardDateStr === dateStr) {
        card.classList.add("selected");
        found = true;
        
        if (triggerScroll) {
          card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
      } else {
        card.classList.remove("selected");
      }
    });
    
    // スライダー内に見つからない場合（未来の日付など）は新しく作成して先頭に追加
    if (!found) {
      const slider = document.getElementById("date-slider");
      const d = targetDate;
      const month = d.getMonth() + 1;
      const day = d.getDate();
      const wday = d.getDay();
      const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
      
      const card = document.createElement("div");
      card.className = "date-card selected";
      card.setAttribute("data-date", dateStr);
      
      let wdayClass = "";
      if (wday === 6) wdayClass = "date-card-sat";
      else if (wday === 0) wdayClass = "date-card-sun";
      
      card.innerHTML = `
        <span class="date-card-month">${month}月</span>
        <span class="date-card-day">${("0" + day).slice(-2)}</span>
        <span class="date-card-weekday ${wdayClass}">${weekdays[wday]}</span>
      `;
      
      card.addEventListener("click", () => {
        document.getElementById("tx-date").value = dateStr;
        selectDate(dateStr, false);
      });
      
      // 最初（今日）のカードの前に挿入（未来になるほど左に追加される形になる）

      }
    }
  }

  // オリジナルカレンダー描画関数
  function renderCustomCalendar(year, month) {
    const monthYearText = document.getElementById("calendar-month-year");
    monthYearText.textContent = `${year}年${month + 1}月`;

    const daysContainer = document.getElementById("calendar-days-container");
    daysContainer.innerHTML = "";

    const firstDayIndex = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();
    const prevMonthTotalDays = new Date(year, month, 0).getDate();

    const today = new Date();
    const todayStr = formatDateISO(today);
    const todayZero = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
    const selectedDateStr = document.getElementById("tx-date").value;

    // 未来の月へのめくり制限を解除
    const nextMonthBtn = document.getElementById("cal-next-month");
    nextMonthBtn.disabled = false;
    nextMonthBtn.style.opacity = "1";
    nextMonthBtn.style.pointerEvents = "auto";

    // 1. 前月の日付セルを追加
    for (let i = firstDayIndex - 1; i >= 0; i--) {
      const prevDay = prevMonthTotalDays - i;
      const cell = document.createElement("div");
      cell.className = "calendar-day-cell other-month";
      cell.textContent = prevDay;
      
      const targetYear = month === 0 ? year - 1 : year;
      const targetMonth = month === 0 ? 11 : month - 1;
      const targetD = new Date(targetYear, targetMonth, prevDay).getTime();
      const dateStr = formatDateISO(new Date(targetYear, targetMonth, prevDay));
      
      if (targetD > todayZero) {
        cell.classList.add("future-date");
      }
      cell.addEventListener("click", () => {
        setCustomCalendarDate(dateStr);
      });
      
      daysContainer.appendChild(cell);
    }

    // 2. 当月の日付セルを追加
    for (let day = 1; day <= totalDays; day++) {
      const cell = document.createElement("div");
      cell.className = "calendar-day-cell";
      cell.textContent = day;

      const currentD = new Date(year, month, day);
      const currentDTime = currentD.getTime();
      const dateStr = formatDateISO(currentD);
      const wday = currentD.getDay();

      if (wday === 6) cell.classList.add("sat");
      else if (wday === 0) cell.classList.add("sun");

      if (dateStr === todayStr) {
        cell.classList.add("today");
      }

      if (dateStr === selectedDateStr) {
        cell.classList.add("selected");
      }

      if (currentDTime > todayZero) {
        cell.classList.add("future-date");
      }
      cell.addEventListener("click", () => {
        setCustomCalendarDate(dateStr);
      });

      daysContainer.appendChild(cell);
    }

    // 3. 翌月の日付セルを追加
    const totalCellsUsed = firstDayIndex + totalDays;
    const remainingCells = 42 - totalCellsUsed;
    for (let day = 1; day <= remainingCells; day++) {
      const cell = document.createElement("div");
      cell.className = "calendar-day-cell other-month";
      cell.textContent = day;

      const targetYear = month === 11 ? year + 1 : year;
      const targetMonth = month === 11 ? 0 : month + 1;
      const targetD = new Date(targetYear, targetMonth, day).getTime();
      const dateStr = formatDateISO(new Date(targetYear, targetMonth, day));

      if (targetD > todayZero) {
        cell.classList.add("future-date");
      }
      
      // 未来の日付でもクリック可能にする
      cell.addEventListener("click", () => {
        setCustomCalendarDate(dateStr);
      });

      daysContainer.appendChild(cell);
    }
  }

    const calcPopup = document.getElementById("calculator-popup");
    const calcExprEl = document.getElementById("calc-expression");
    const calcResultEl = document.getElementById("calc-result");
    const calcCloseBtn = document.getElementById("calc-close-btn");
    const calcApplyBtn = document.getElementById("calc-apply-btn");
    const txAmount = document.getElementById("tx-amount");

    let calcExpressionStr = "";

    // 数式入力の直接評価（フォーカスアウト時）
    txAmount.addEventListener("blur", () => {
      const val = txAmount.value.trim();
      if (val) {
        let normalized = val.replace(/＋/g, '+').replace(/ー/g, '-').replace(/＊/g, '*').replace(/／/g, '/');
        const evaluated = evaluateMathExpression(normalized);
        if (evaluated !== null) {
          txAmount.value = evaluated;
        }
      }
    });

    // 電卓起動
    calcTrigger.addEventListener("click", (e) => {
      e.stopPropagation();
      const active = calcPopup.classList.toggle("active");
      if (active) {
        const curVal = txAmount.value.trim();
        if (curVal && !isNaN(evaluateMathExpression(curVal))) {
          calcExpressionStr = curVal;
        } else {
          calcExpressionStr = "";
        }
        updateCalcDisplay();
      }
    });

    // 電卓内のクリックイベント
    calcPopup.querySelectorAll(".calc-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const val = btn.getAttribute("data-val");
        
        if (val === "C") {
          calcExpressionStr = "";
        } else if (val === "back") {
          calcExpressionStr = calcExpressionStr.slice(0, -1);
        } else if (val === "tax8" || val === "tax10") {
          if (calcExpressionStr) {
            const taxMultiplier = val === "tax8" ? "1.08" : "1.1";
            if (/^\d+(\.\d+)?$/.test(calcExpressionStr)) {
              calcExpressionStr = `${calcExpressionStr} * ${taxMultiplier}`;
            } else {
              calcExpressionStr = `(${calcExpressionStr}) * ${taxMultiplier}`;
            }
          }
        } else if (val === "=") {
          const evaluated = evaluateMathExpression(calcExpressionStr);
          if (evaluated !== null) {
            calcExpressionStr = evaluated.toString();
          }
        } else {
          calcExpressionStr += val;
        }
        updateCalcDisplay();
      });
    });

    calcCloseBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      calcPopup.classList.remove("active");
    });

    calcApplyBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      const evaluated = evaluateMathExpression(calcExpressionStr);
      if (evaluated !== null) {
        txAmount.value = evaluated;
      } else if (calcExpressionStr) {
        txAmount.value = calcExpressionStr;
      }
      calcPopup.classList.remove("active");
    });

    calcPopup.addEventListener("click", (e) => {
      e.stopPropagation();
    });

    // ドキュメントクリックで閉じる
    document.addEventListener("click", () => {
      calcPopup.classList.remove("active");
    });

    function updateCalcDisplay() {
      calcExprEl.textContent = calcExpressionStr.replace(/\*/g, "×").replace(/\//g, "÷");
      const evaluated = evaluateMathExpression(calcExpressionStr);
      calcResultEl.textContent = evaluated !== null ? evaluated.toLocaleString() : "0";
    }
    
    // データの読み込み
    loadData();
  });

  /**
   * 月移動ボタン処理
   */
  function adjustMonth(diff) {
    const monthInput = document.getElementById("month-input");
    const date = new Date((currentMonth + "-01").replace(/-/g, "/"));
    date.setMonth(date.getMonth() + diff);
    
    const year = date.getFullYear();
    const month = ("0" + (date.getMonth() + 1)).slice(-2);
    currentMonth = `${year}-${month}`;
    monthInput.value = currentMonth;
    
    // 表示の更新
    if (typeof window.updateMonthPickerDisplay === "function") {
      window.updateMonthPickerDisplay();
    }
    
    // 編集モードを抜ける
    cancelEdit();
    
    loadData();
  }

  function loadData() {
    AppLogger.log("UI", `${currentMonth} のデータ取得を開始します。`);
    
    // ローカルキャッシュのメタデータを取得して clientDbLastUpdated を同期
    const cacheObj = getCacheFromStorage();
    if (cacheObj.clientDbLastUpdated) {
      clientDbLastUpdated = cacheObj.clientDbLastUpdated;
    }

    let bypassCache = false;
    let isFromCacheApplied = false;

    if (isInitialLoad) {
      isInitialLoad = false;
      const serverTs = typeof window.initialDbLastUpdated !== "undefined" ? window.initialDbLastUpdated : null;
      
      if (serverTs && clientDbLastUpdated && serverTs === clientDbLastUpdated) {
        AppLogger.log("DATABASE", `初回ロード: ローカルの最終更新スタンプ（${clientDbLastUpdated}）がサーバー（${serverTs}）と一致するため、キャッシュを適用します。`);
      } else {
        bypassCache = true;
        AppLogger.log("DATABASE", `初回ロード: サーバーの最新スタンプ（${serverTs}）がローカル（${clientDbLastUpdated}）と異なるため、キャッシュをバイパスして最新データを取得します。`);
      }
    }

    if (!bypassCache) {
      const cachedEntry = cacheObj.cache[currentMonth];

      if (cachedEntry && cachedEntry.timestamp === clientDbLastUpdated) {
        AppLogger.log("DATABASE", `${currentMonth} の有効なキャッシュが見つかりました。キャッシュからロードします。`, { timestamp: clientDbLastUpdated });
        onDataLoaded(cachedEntry.data, true);
        isFromCacheApplied = true;
      } else if (cachedEntry) {
        AppLogger.log("DATABASE", `${currentMonth} のキャッシュは存在しますが、タイムスタンプが古い、または不一致です。`, { cacheTs: cachedEntry.timestamp, clientDbLastUpdated });
      }
    }

    // 表示月のバックグラウンド・スタンプチェック (SWR: Stale-While-Revalidate)
    // キャッシュから仮表示した際、他デバイス等での更新がないかサーバーの最新タイムスタンプをバックグラウンド確認する
    if (isFromCacheApplied) {
      AppLogger.log("DATABASE", `月切り替え: キャッシュを仮表示しました。バックグラウンドで最新タイムスタンプを確認します...`);
      const checkedMonth = currentMonth;
      
      startSyncAnimation('syncing');
      
      google.script.run
        .withSuccessHandler(function(serverTs) {
          stopSyncAnimation();
          if (checkedMonth !== currentMonth) {
            AppLogger.log("SYSTEM", `タイムスタンプ確認中に表示月が ${checkedMonth} から ${currentMonth} に変更されたため、結果を破棄します。`);
            return;
          }
          if (serverTs && clientDbLastUpdated && serverTs !== clientDbLastUpdated) {
            AppLogger.log("DATABASE", `タイムスタンプ差異検知: サーバーの最新スタンプ（${serverTs}）とローカル（${clientDbLastUpdated}）に差異があります。キャッシュを廃棄してデータを再取得します。`);
            // 全キャッシュの破棄
            clearAllCache();
            // サーバーから再取得
            fetchDataFromServerDirectly();
          } else {
            AppLogger.log("DATABASE", `タイムスタンプ確認完了: サーバーとの差異はありませんでした。キャッシュは最新です。`);
          }
        })
        .withFailureHandler(function(err) {
          stopSyncAnimation();
          console.warn("Failed to check timestamp from background: " + err.message);
        })
        .getLatestTimestamp();
        
      return; // キャッシュ適用済みのため同期処理はここで一旦終了
    }

    // キャッシュがない、またはバイパスされた場合は、通常通りサーバーからデータを取得する
    fetchDataFromServerDirectly();
  }

  function fetchDataFromServerDirectly() {
    if (activePrefetchMonth === currentMonth) {
      AppLogger.log("API", `${currentMonth} は現在プリフェッチ中のため、通信の完了を待機します。`);
      showTableLoading(true);
      document.getElementById("settlement-loading").style.display = "flex";
      document.getElementById("settlement-results").style.display = "none";
      
      prefetchPendingMonth = currentMonth;
      prefetchSuccessCallback = function(data) {
        AppLogger.log("API", `${currentMonth} のプリフェッチ待機が完了し、データを適用します。`);
        onDataLoaded(data);
      };
      return;
    }
    
    prefetchPendingMonth = null;
    prefetchSuccessCallback = null;

    showTableLoading(true);
    document.getElementById("settlement-loading").style.display = "flex";
    document.getElementById("settlement-results").style.display = "none";
    
    AppLogger.log("API", `サーバーから ${currentMonth} のデータを取得中...`);
    google.script.run
      .withSuccessHandler(function(response) {
        AppLogger.log("API", `サーバーから ${currentMonth} のデータを正常に取得しました。`);
        onDataLoaded(response);
      })
      .withFailureHandler(function(err) {
        AppLogger.log("ERROR", `${currentMonth} のデータ取得に失敗しました。`, err);
        onDataLoadFailed(err);
      })
      .getAppData(currentMonth);
  }

  // 優先順位付き直列プリフェッチチェーン (Offsets: [-1, 1, -2, 2, -3, 3])
  function prefetchMonths(baseMonthStr) {
    const offsets = [ -1, 1, -2, 2, -3, 3 ];
    let idx = 0;
    
    AppLogger.log("API", `${baseMonthStr} を起点とする周辺月（${offsets.join(', ')} ヶ月）のプリフェッチ処理を開始します。`);

    function next() {
      if (baseMonthStr !== currentMonth) {
        AppLogger.log("SYSTEM", `表示月が変更されたため、${baseMonthStr} を起点とするプリフェッチを中断します。`);
        return; // 中断
      }
      if (idx >= offsets.length) {
        activePrefetchMonth = null;
        AppLogger.log("SYSTEM", "周辺月のプリフェッチ処理がすべて完了しました。");
        return;
      }

      const offset = offsets[idx];
      idx++;

      const date = new Date((baseMonthStr + "-01").replace(/-/g, "/"));
      date.setMonth(date.getMonth() + offset);
      const y = date.getFullYear();
      const m = ("0" + (date.getMonth() + 1)).slice(-2);
      const targetMonth = `${y}-${m}`;

      const cacheObj = getCacheFromStorage();
      const cached = cacheObj.cache[targetMonth];
      if (cached && cached.timestamp === clientDbLastUpdated) {
        AppLogger.log("DATABASE", `${targetMonth} はすでに最新キャッシュが存在するため、プリフェッチをスキップします。`);
        next();
        return;
      }

      activePrefetchMonth = targetMonth;
      AppLogger.log("API", `${targetMonth} のプリフェッチ（バックグラウンド取得）を開始します...`);

      google.script.run
        .withSuccessHandler(function(response) {
          if (response && response.success) {
            AppLogger.log("API", `${targetMonth} のプリフェッチに成功しました。キャッシュに保存します。`);
            saveMonthDataToCache(targetMonth, response);
            if (prefetchPendingMonth === targetMonth && prefetchSuccessCallback) {
              AppLogger.log("API", `${targetMonth} は現在表示要求中のため、待機中のコールバックを実行して即時描画します。`);
              const cb = prefetchSuccessCallback;
              prefetchPendingMonth = null;
              prefetchSuccessCallback = null;
              cb(response);
            }
          } else {
            AppLogger.log("ERROR", `${targetMonth} のプリフェッチレスポンスが異常です。`, response);
          }
          next();
        })
        .withFailureHandler(function(err) {
          AppLogger.log("ERROR", `${targetMonth} のプリフェッチ通信に失敗しました。`, err);
          next();
        })
        .getAppData(targetMonth);
    }

    next();
  }

  /**
   * データ取得成功時の処理
   */
  function onDataLoaded(response, isFromCache = false) {
    AppLogger.log("UI", `${(response && response.month) || currentMonth} のデータを画面に描画します。ソース: ${isFromCache ? 'キャッシュ' : 'サーバー'}`);
    showTableLoading(false);
    document.getElementById("settlement-loading").style.display = "none";
    
    if (!response) {
      alert("データの取得に失敗しました（サーバーからの応答がありません）。\n権限の再承認が必要な可能性があります。画面を再読み込みするか、本番公開URLに再度アクセスしてみてください。");
      return;
    }
    
    if (!response.success) {
      alert("エラーが発生しました:\n" + response.message);
      return;
    }
    
    appData = response;

    if (!isFromCache) {
      saveMonthDataToCache(response.month, response);
    }
    
    // 各選択チップのオプション設定
    populateDropdowns(response.masters);
    
    // スタッツカードの表示更新
    updateStatsCards(response);
    
    // 精算結果の表示更新
    updateSettlements(response.analysis.settlementInstructions, response.analysis.userBalances);
    
    // 清算ステータスの表示更新
    updateSettlementStatusDisplay(response.settlementRecords, response.analysis);
    
    // カテゴリグラフの更新
    updateChart(response.analysis.categoryTotals);
    
    // 明細履歴テーブルの更新
    updateHistoryTable(filterTransactions(response.transactions));
    
    // アイコンの再適用
    lucide.createIcons();
    
    // 周辺月データの事前取得を開始
    prefetchMonths(currentMonth);

    // 表示月の「年」の年間データをプリフェッチする
    prefetchYearOfCurrentMonth();
  }

  /**
   * データ取得失敗時
   */
  function onDataLoadFailed(error) {
    showTableLoading(false);
    document.getElementById("settlement-loading").style.display = "none";
    alert("データの読み込みに失敗しました。スプレッドシートのIDと権限を確認してください。\nエラー: " + error.message);
  }

  /**
   * 選択チップのオプション動的生成
   */
  function populateDropdowns(masters) {
    // カテゴリ
    const currentCat = selectCategory.getValue();
    selectCategory.setOptions(masters.categories);
    if (masters.categories.includes(currentCat)) {
      selectCategory.setValue(currentCat);
    }

    // 支払い者
    const currentPayer = selectPaidBy.getValue();
    selectPaidBy.setOptions(masters.users);
    if (masters.users.includes(currentPayer)) {
      selectPaidBy.setValue(currentPayer);
    }

    // 精算・立替タイプ
    const currentSplit = selectSplitType.getValue();
    selectSplitType.setOptions(masters.split_types);
    if (currentSplit && masters.split_types.includes(currentSplit)) {
      selectSplitType.setValue(currentSplit);
    } else {
      selectSplitType.setValue("割り勘"); // デフォルト値
    }

    // 負担するメンバー (マルチセレクト)
    const currentBeneficiaries = selectBeneficiaries.getValue();
    selectBeneficiaries.setOptions(masters.users);
    if (currentBeneficiaries) {
      selectBeneficiaries.setValue(currentBeneficiaries);
    } else {
      // 初期状態では全員を選択
      selectBeneficiaries.setValue(masters.users.join(','));
    }

    // フィルター用ChoiceChipsの更新
    if (filterCategoryChips) {
      filterCategoryChips.setOptions(masters.categories);
    }
    if (filterPaidByChips) {
      filterPaidByChips.setOptions(masters.users);
    }

    // 現在の activeFilters がマスタに存在するものだけに絞り込む
    if (activeFilters.categories.length > 0 && masters.categories) {
      activeFilters.categories = activeFilters.categories.filter(c => masters.categories.includes(c));
    }
    if (activeFilters.paidBy.length > 0 && masters.users) {
      activeFilters.paidBy = activeFilters.paidBy.filter(p => masters.users.includes(p));
    }

    // アクティブなフィルターバッジを描画
    renderActiveFilters();
    
    // 支払い方法 (精算記録モーダル用)
    const settleMethodInput = document.getElementById("settle-method-input");
    if (settleMethodInput && masters.payment_methods) {
      const currentVal = settleMethodInput.value;
      settleMethodInput.innerHTML = '<option value="">選択してください</option>';
      masters.payment_methods.forEach(function(pm) {
        const opt = document.createElement("option");
        opt.value = pm;
        opt.textContent = pm;
        settleMethodInput.appendChild(opt);
      });
      settleMethodInput.value = currentVal;
    }
    
    // 一括設定用の精算タイプ (レシート一括モーダル用)
    const bulkSplitTypeSelect = document.getElementById("bulk-split-type");
    if (bulkSplitTypeSelect && masters.split_types) {
      const currentVal = bulkSplitTypeSelect.value;
      bulkSplitTypeSelect.innerHTML = '<option value="">（選択してください）</option>';
      masters.split_types.forEach(function(st) {
        let emoji = "";
        if (st === "割り勘") emoji = "👥 ";
        else if (st === "立て替え") emoji = "🙋‍♂️ ";
        else if (st === "個別") emoji = "👤 ";
        
        const opt = document.createElement("option");
        opt.value = st;
        opt.textContent = emoji + st;
        bulkSplitTypeSelect.appendChild(opt);
      });
      bulkSplitTypeSelect.value = currentVal;
    }

    // ステータス (精算記録モーダル用)
    const settleStatusInput = document.getElementById("settle-status-input");
    if (settleStatusInput && masters.settlement_statuses) {
      const currentVal = settleStatusInput.value;
      settleStatusInput.innerHTML = "";
      masters.settlement_statuses.forEach(function(ss) {
        const opt = document.createElement("option");
        opt.value = ss;
        opt.textContent = ss;
        settleStatusInput.appendChild(opt);
      });
      settleStatusInput.value = currentVal || (masters.settlement_statuses.length > 0 ? masters.settlement_statuses[0] : "未払い");
    }

    // 支払いパターン (精算記録モーダル用)
    const settlePatternInput = document.getElementById("settle-pattern-input");
    if (settlePatternInput && masters.payment_patterns) {
      const currentVal = settlePatternInput.value;
      settlePatternInput.innerHTML = '<option value="">選択してください</option>';
      masters.payment_patterns.forEach(function(pp) {
        const opt = document.createElement("option");
        opt.value = pp;
        opt.textContent = pp;
        settlePatternInput.appendChild(opt);
      });
      settlePatternInput.value = currentVal;
    }
    
    // UI制御の同期
    onSplitTypeChange(selectSplitType.getValue());
  }

  /**
   * 精算タイプ変更時のインタラクティブなUI制御
   */
  function onSplitTypeChange(splitType) {
    const benGroup = document.getElementById("beneficiaries-group");
    const benLabel = document.getElementById("beneficiaries-label");
    const payer = selectPaidBy.getValue();
    const allUsers = appData ? appData.masters.users : [];
    
    if (splitType === "個別") {
      // 個別の場合は負担メンバー選択を非表示にし、負担者を支払い者本人のみに設定
      benGroup.style.display = "none";
      if (payer) {
        selectBeneficiaries.setValue(payer);
      }
    } else {
      benGroup.style.display = "block";
      
      if (splitType === "割り勘") {
        benLabel.textContent = "負担するメンバー（複数選択可）";
        // 新規登録の初期化時は全員を選択
        if (!document.getElementById("tx-id").value && selectBeneficiaries.getValue() === "") {
          selectBeneficiaries.setValue(allUsers.join(','));
        }
      } else if (splitType === "立て替え") {
        benLabel.textContent = "立て替えた相手（複数選択可）";
        // 新規登録の初期化時は支払者以外を選択
        if (!document.getElementById("tx-id").value && payer) {
          const others = allUsers.filter(u => u !== payer);
          selectBeneficiaries.setValue(others.join(','));
        }
      }
    }
  }

  /**
   * 支払い者変更時の自動プレセレクト制御
   */
  function onPayerChange(payer) {
    const splitType = selectSplitType.getValue();
    const allUsers = appData ? appData.masters.users : [];
    
    if (splitType === "個別") {
      // 個別の場合は負担者を支払い者に強制変更
      selectBeneficiaries.setValue(payer);
    } else if (splitType === "立て替え") {
      // 立て替えの場合、支払い者自身を負担対象から自動で除外する
      const currentBen = selectBeneficiaries.getValue().split(',').filter(u => u !== "");
      const newBen = currentBen.filter(u => u !== payer);
      
      if (newBen.length === 0) {
        // もし誰も選択されていなければ、支払者以外全員をセット
        const fallback = allUsers.filter(u => u !== payer);
        selectBeneficiaries.setValue(fallback.join(','));
      } else {
        selectBeneficiaries.setValue(newBen.join(','));
      }
    }
  }

  /**
   * クイック統計カードの更新
   */
  function updateStatsCards(data) {
    const total = data.analysis.totalExpense;
    document.getElementById("stat-total").textContent = `¥${total.toLocaleString()}`;
    
    const userCount = data.masters.users.length;
    document.getElementById("stat-users-count").textContent = `${userCount} 人`;
  }

  /**
   * 精算指示＆個人別バランスの表示更新
   */
  function updateSettlements(instructions, balances) {
    const resultsContainer = document.getElementById("settlement-results");
    resultsContainer.innerHTML = "";
    resultsContainer.style.display = "flex";
    
    let balanceHtml = '<div style="margin-bottom: 8px; border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 8px; width: 100%;">';
    balances.forEach(b => {
      const balanceSign = b.balance > 0 ? "+" : "";
      const balanceColor = b.balance > 0 ? "#51cf66" : (b.balance < 0 ? "#ff6b6b" : "inherit");
      
      balanceHtml += `
        <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:4px; color:var(--text-secondary);">
          <span>${b.user} (支出: ¥${b.used.toLocaleString()} / 支払: ¥${b.paid.toLocaleString()})</span>
          <span style="color: ${balanceColor}; font-weight:600;">${balanceSign}¥${b.balance.toLocaleString()}</span>
        </div>
      `;
    });
    balanceHtml += '</div>';
    resultsContainer.innerHTML = balanceHtml;

    if (instructions.length === 0) {
      resultsContainer.innerHTML += `
        <div class="settlement-empty">
          <i data-lucide="smile" style="width:20px; height:20px; display:block; margin:0 auto 8px; color:var(--accent-green);"></i>
          今月の精算は不要です。全員が均等に負担しています。
        </div>
      `;
      lucide.createIcons();
      return;
    }
    
    instructions.forEach(ins => {
      const item = document.createElement("div");
      item.className = "settlement-item";
      item.style.width = "100%";
      item.innerHTML = `
        <div class="settlement-parties">
          <span class="settlement-user-pill debtor">${ins.from}</span>
          <span class="settlement-direction-arrow"><i data-lucide="arrow-right" style="width:14px; height:14px;"></i></span>
          <span class="settlement-user-pill creditor">${ins.to}</span>
        </div>
        <div class="settlement-amount">¥${ins.amount.toLocaleString()}</div>
      `;
      resultsContainer.appendChild(item);
    });
    
    lucide.createIcons();
  }

  /**
   * カテゴリグラフの更新
   */
  function updateChart(categoryTotals) {
    const ctx = document.getElementById('categoryChart').getContext('2d');
    const categories = Object.keys(categoryTotals);
    const data = Object.values(categoryTotals);
    
    const colors = [
      '#2eaadc', '#ae3ec9', '#37b24d', '#f76707', '#f03e3e', '#f59f00', '#748ffc', '#10b981', '#94a3b8'
    ];
    
    if (categoryChart) {
      categoryChart.destroy();
    }
    
    const themeColors = getChartThemeColors();
    
    if (categories.length === 0 || data.reduce((a, b) => a + b, 0) === 0) {
      categoryChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['データなし'],
          datasets: [{
            data: [1],
            backgroundColor: [themeColors.emptyBg],
            borderWidth: 1,
            borderColor: themeColors.cardBg
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { enabled: false }
          },
          cutout: '75%'
        }
      });
      return;
    }
    
    categoryChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: categories,
        datasets: [{
          data: data,
          backgroundColor: colors.slice(0, categories.length),
          borderWidth: 1,
          borderColor: themeColors.cardBg,
          hoverOffset: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: window.innerWidth < 600 ? 'bottom' : 'right',
            labels: {
              boxWidth: 12,
              color: themeColors.text,
              font: { size: 10, family: 'Inter' }
            }
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                const val = context.raw || 0;
                const total = context.dataset.data.reduce((a, b) => a + b, 0);
                const pct = Math.round((val / total) * 100);
                return `${context.label}: ¥${val.toLocaleString()} (${pct}%)`;
              }
            }
          }
        },
        cutout: '70%'
      }
    });
  }

  /**
   * 明細履歴テーブルの更新
   */
  function updateHistoryTable(transactions) {
    const tbody = document.getElementById("history-tbody");
    const noHistoryMsg = document.getElementById("no-history-msg");
    tbody.innerHTML = "";
    
    if (transactions.length === 0) {
      noHistoryMsg.style.display = "block";
      return;
    }
    noHistoryMsg.style.display = "none";
    
    const allUsers = appData ? appData.masters.users : [];
    
    transactions.forEach(tx => {
      const tr = document.createElement("tr");
      
      // 1. 精算タイプのバッジ化
      const splitType = tx.split_type || "割り勘";
      let splitTypeBadge = "";
      if (splitType === "割り勘") {
        splitTypeBadge = `<span class="badge badge-split">👥 割り勘</span>`;
      } else if (splitType === "立て替え") {
        splitTypeBadge = `<span class="badge badge-fronting">🙋‍♂️ 立て替え</span>`;
      } else if (splitType === "個別") {
        splitTypeBadge = `<span class="badge badge-individual">👤 個別</span>`;
      }
      
      // 2. 負担メンバー一覧の整形表示
      const beneficiaries = tx.beneficiaries ? tx.beneficiaries.split(',') : [];
      let beneficiariesBadge = "";
      if (splitType === "個別") {
        beneficiariesBadge = `<span class="badge badge-individual">${tx.paid_by}（自己負担）</span>`;
      } else if (beneficiaries.length === 0 || beneficiaries.length === allUsers.length) {
        beneficiariesBadge = `<span class="badge badge-split">全員</span>`;
      } else {
        const listText = beneficiaries.join(', ');
        beneficiariesBadge = `<span class="badge badge-fronting" title="${listText}">${beneficiaries.length}名 (${listText})</span>`;
      }
      
      let titleContent = `
        <div style="font-weight: 500;">${escapeHtml(tx.title)}</div>
        ${tx.memo ? `<div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px;">${escapeHtml(tx.memo)}</div>` : ''}
      `;

      tr.innerHTML = `
        <td>${titleContent}</td>
        <td style="color: var(--text-secondary); font-size: 0.8rem;">${formatJapaneseDate(tx.date)}</td>
        <td><span class="badge badge-category">${tx.category}</span></td>
        <td><span class="badge badge-user">${tx.paid_by}</span></td>
        <td class="text-right amount-val">¥${Number(tx.amount).toLocaleString()}</td>
        <td>${splitTypeBadge}</td>
        <td>${beneficiariesBadge}</td>
        <td class="action-col" style="min-width: 80px;">
          <div style="display: flex; gap: 4px; justify-content: flex-end;">
            <button class="icon-btn" onclick="startEditTransaction('${tx.id}')" title="編集">
              <i data-lucide="edit-3" style="width: 14px; height: 14px; color: var(--text-secondary);"></i>
            </button>
            <button class="icon-btn btn-danger-hover" onclick="deleteTransaction('${tx.id}', '${escapeJsStr(tx.title)}')" title="削除">
              <i data-lucide="trash-2" style="width: 14px; height: 14px; color: var(--accent-red);"></i>
            </button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });
    lucide.createIcons();
  }

  /**
   * 編集モードの開始
   */
  function startEditTransaction(id) {
    if (!appData) return;
    const tx = appData.transactions.find(t => t.id === id);
    if (!tx) return;
    
    // フォームに値を格納
    document.getElementById("tx-id").value = tx.id;
    document.getElementById("tx-date").value = tx.date;
    document.getElementById("tx-title").value = tx.title;
    document.getElementById("tx-amount").value = tx.amount;
    document.getElementById("tx-memo").value = tx.memo || "";
    
    // 日付スライダーの選択状態を同期
    selectDate(tx.date, true);
    
    // 各選択チップに値をセット
    selectCategory.setValue(tx.category);
    selectPaidBy.setValue(tx.paid_by);
    selectSplitType.setValue(tx.split_type || "割り勘");

  /**
   * 取引データ登録・更新送信処理
   */
  function submitTransaction(e) {
    e.preventDefault();
    
    const txId = document.getElementById("tx-id").value;
    const category = selectCategory.getValue();
    const paidBy = selectPaidBy.getValue();
    const splitType = selectSplitType.getValue();
    const beneficiaries = selectBeneficiaries.getValue();
    
    // バリデーション
    if (!category) {
      alert("カテゴリを選択してください。");
      return;
    }
    if (!paidBy) {
      alert("支払い者を選択してください。");
      return;
    }
    if (!splitType) {
      alert("精算・立替タイプを選択してください。");
      return;
    }
    if (splitType !== "個別" && !beneficiaries) {
      alert("負担するメンバーを少なくとも1名選択してください。");
      return;
    }

    // 金額入力値の検証と数式評価
    const amountInput = document.getElementById("tx-amount");
    let amountVal = amountInput.value.trim();
    // 全角の＋ー＊／などを半角に変換
    amountVal = amountVal.replace(/＋/g, '+').replace(/ー/g, '-').replace(/＊/g, '*').replace(/／/g, '/');
    const evaluatedAmount = evaluateMathExpression(amountVal);
    if (evaluatedAmount !== null) {
      amountInput.value = evaluatedAmount;
    } else {
      const num = Number(amountVal);
      if (isNaN(num) || num <= 0) {
        alert("金額は有効な数値または数式を入力してください。");
        return;
      }
    }
    
    const tx = {
      id: txId,
      date: document.getElementById("tx-date").value,
      title: document.getElementById("tx-title").value,
      amount: document.getElementById("tx-amount").value,
      category: category,
      paid_by: paidBy,
      split_type: splitType,
      beneficiaries: splitType === "個別" ? paidBy : beneficiaries,
      memo: document.getElementById("tx-memo").value
    };
    
    // ローディング表示
    const submitBtn = document.getElementById("submit-btn");
    const originalText = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<div class="spinner" style="width:14px; height:14px; border-width:2px; display:inline-block; margin-right:6px;"></div> 保存中...';
    
    if (txId) {
      google.script.run
        .withSuccessHandler(res => {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
          
          if (res.success) {
            cancelEdit();
            clearAllCache();
            loadData();
          } else {
            alert("更新に失敗しました: " + res.message);
          }
        })
        .withFailureHandler(err => {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
          alert("更新処理中にエラーが発生しました: " + err.message);
        })
        .updateTransaction(tx);
    } else {
      google.script.run
        .withSuccessHandler(res => {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
          
          if (res.success) {
            document.getElementById("tx-title").value = "";
            document.getElementById("tx-amount").value = "";
            document.getElementById("tx-memo").value = "";
            
            // 選択状態のリセット
            selectCategory.setValue("");
            cancelEdit();
            clearAllCache();
            loadData();
          } else {
            alert("登録に失敗しました: " + res.message);
          }
        })
        .withFailureHandler(err => {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
          alert("登録処理中にエラーが発生しました: " + err.message);
        })
        .addTransaction(tx);
    }
  }

  // ==========================================
  // レシートOCR処理 (予備用)
  // ==========================================
  
  function handleReceiptUpload(e) {
    const files = e.target.files;
    if (!files || files.length === 0) return;
    
    if (files.length === 1) {
      // === 1枚の場合: 従来通りフォームに自動入力 ===
      openModal('ocr-loading-modal');
      document.getElementById('ocr-loading-title').textContent = 'Geminiでレシートを解析中...';
      document.getElementById('ocr-loading-desc').innerHTML = '画像から店名、日付、金額、カテゴリを読み取っています。<br>数秒ほどお待ちください。';
      
      const reader = new FileReader();
      reader.onload = function(evt) {
        const dataUrl = evt.target.result;
        const parts = dataUrl.split(",");
        const mimeType = parts[0].match(/:(.*?);/)[1];
        const base64Data = parts[1];
        
        let clientKey = "";
        try {
          const stored = localStorage.getItem("_hk_session_data");
          if (stored) clientKey = atob(stored);
        } catch(e) {}
        
        google.script.run
          .withSuccessHandler(onReceiptAnalyzed)
          .withFailureHandler(onReceiptAnalysisFailed)
          .analyzeReceipt(base64Data, mimeType, clientKey);
      };
      reader.readAsDataURL(files[0]);
    } else {
      // === 複数枚の場合: 一括解析 → プレビュー → 一括登録 ===
      openModal('ocr-loading-modal');
      document.getElementById('ocr-loading-title').textContent = files.length + '枚のレシートを解析中...';
      document.getElementById('ocr-loading-desc').innerHTML = '複数のレシートを1回のAPIコールで解析しています。<br>枚数が多いほど時間がかかります。';
      
      // 全ファイルをbase64に変換してからサーバーに送信
      const imagePromises = [];
      for (let i = 0; i < files.length; i++) {
        imagePromises.push(readFileAsBase64(files[i]));
      }
      
      Promise.all(imagePromises).then(function(images) {
        let clientKey = "";
        try {
          const stored = localStorage.getItem("_hk_session_data");
          if (stored) clientKey = atob(stored);
        } catch(e) {}
        
        google.script.run
          .withSuccessHandler(onBatchReceiptsAnalyzed)
          .withFailureHandler(onReceiptAnalysisFailed)
          .analyzeReceipts(images, clientKey);
      }).catch(function(err) {
        closeModal('ocr-loading-modal');
        alert("画像の読み込みに失敗しました: " + err.message);
      });
    }
    
    e.target.value = ""; // リセット
  }
  
  /**
   * ファイルをbase64に変換する（Promise版）
   */
  function readFileAsBase64(file) {
    return new Promise(function(resolve, reject) {
      const reader = new FileReader();
      reader.onload = function(evt) {
        const dataUrl = evt.target.result;
        const parts = dataUrl.split(",");
        const mimeType = parts[0].match(/:(.*?);/)[1];
        const base64Data = parts[1];
        resolve({ base64Data: base64Data, mimeType: mimeType });
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
  
  /**
   * 1枚のレシート解析完了時（従来と同じ）
   */
  function onReceiptAnalyzed(response) {
    closeModal('ocr-loading-modal');
    
    if (!response.success) {
      alert("レシートの解析に失敗しました:\n" + response.message);
      return;
    }
    
    // 複数データが含まれている場合は一括登録プレビューを開く
    if (response.data && response.data.length > 1) {
      onBatchReceiptsAnalyzed(response);
      return;
    }
    
    // 単一データの場合
    const data = Array.isArray(response.data) ? response.data[0] : response.data;
    if (!data) return;
    
    const dateInput = document.getElementById("tx-date");
    const titleInput = document.getElementById("tx-title");
    const amountInput = document.getElementById("tx-amount");
    
    if (data.date) {
      dateInput.value = data.date;
      selectDate(data.date, true);
    }
    if (data.title) titleInput.value = data.title;
    if (data.amount) amountInput.value = data.amount;
    
    if (data.category) {
      selectCategory.setValue(data.category);
    }
    
    const dateSliderWrapper = document.querySelector(".date-slider-wrapper");
    const autofilled = [dateSliderWrapper, titleInput, amountInput, document.getElementById("tx-category-container")];
    autofilled.forEach(el => {
      if (el) {
        el.style.backgroundColor = "rgba(46, 170, 220, 0.15)";
        el.style.transition = "background-color 1s ease";
        setTimeout(() => {
          el.style.backgroundColor = "";
        }, 1500);
      }
    });
  }
  
  /**
   * 複数レシート一括解析完了時
   */
  /**
   * 複数レシート一括解析完了時
   */
  let parsedReceiptBatch = [];

        payerOptionsHtml += `<option value="${escapeHtml(u)}" ${selected}>${escapeHtml(u)}</option>`;
      });
      
      // 精算タイプ選択肢HTML

      splitTypes.forEach(function(st) {

        else if (st === "立て替え") emoji = "🙋‍♂️ ";
        else if (st === "個別") emoji = "👤 ";
        
        const selected = st === "割り勘" ? "selected" : "";
        splitTypeOptionsHtml += `<option value="${escapeHtml(st)}" ${selected}>${emoji}${escapeHtml(st)}</option>`;

      // 負担メンバーのチェックボックスHTML

  /**
   * 一括設定の適用
   */
  function applyBulkSetting(type) {
    if (type === "paid-by") {
      const val = document.getElementById("bulk-paid-by").value;
      if (!val) return;
      const selects = document.querySelectorAll("#receipt-batch-tbody .batch-paid-by");
      selects.forEach(function(s) {
        s.value = val;
        syncRowBeneficiaries(s); // 支払い者変更に追従して負担メンバーチェックボックスも同期
      });
    } else if (type === "split-type") {
      const val = document.getElementById("bulk-split-type").value;
      if (!val) return;
      const selects = document.querySelectorAll("#receipt-batch-tbody .batch-split-type");
      selects.forEach(function(s) {
        s.value = val;
        syncRowBeneficiaries(s); // 精算タイプ変更に追従して負担メンバーチェックボックスも同期
      });
    } else if (type === "beneficiaries") {
      // 一括設定のチェックボックスの状態を取得
      const bulkChks = document.querySelectorAll("#bulk-beneficiaries-container .bulk-beneficiary-chk");
      const stateMap = {};
      bulkChks.forEach(function(c) {
        stateMap[c.value] = c.checked;
      });
      // すべての行に適用（個別や立て替えの制約を考慮しつつ適用）
      const rows = document.querySelectorAll("#receipt-batch-tbody tr");
      rows.forEach(function(tr) {
        const splitSelect = tr.querySelector(".batch-split-type");
        const payerSelect = tr.querySelector(".batch-paid-by");
        const splitType = splitSelect ? splitSelect.value : "";
        const payer = payerSelect ? payerSelect.value : "";
        
        const rowChks = tr.querySelectorAll(".batch-beneficiary-chk");
        rowChks.forEach(function(c) {
          if (stateMap.hasOwnProperty(c.value)) {
            if (splitType === "個別") {
              c.checked = (c.value === payer);
              c.disabled = true;
              c.parentElement.style.opacity = (c.value === payer) ? "1" : "0.5";
            } else if (splitType === "立て替え" && c.value === payer) {
              c.checked = false;
              c.disabled = false;
              c.parentElement.style.opacity = "1";
            } else {
              c.checked = stateMap[c.value];
              c.disabled = false;
              c.parentElement.style.opacity = "1";
            }
          }
        });
      });
    }
  }
  
  /**
   * 行内の「負担メンバー」チェックボックスの状態を精算タイプ・支払い者と同期する
   */
  function syncRowBeneficiaries(element) {
    const tr = element.closest("tr");
    if (!tr) return;
    const payerSelect = tr.querySelector(".batch-paid-by");
    const splitSelect = tr.querySelector(".batch-split-type");
    if (!payerSelect || !splitSelect) return;
    
    const payer = payerSelect.value;
    const splitType = splitSelect.value;
    const chks = tr.querySelectorAll(".batch-beneficiary-chk");
    
    chks.forEach(function(chk) {
      const u = chk.value;
      if (splitType === "個別") {
        chk.checked = (u === payer);
        chk.disabled = true;
        chk.parentElement.style.opacity = (u === payer) ? "1" : "0.5";
      } else if (splitType === "立て替え") {
        chk.checked = (u !== payer);
        chk.disabled = false;
        chk.parentElement.style.opacity = "1";
      } else { // "割り勘"
        chk.checked = true;
        chk.disabled = false;
        chk.parentElement.style.opacity = "1";
      }
    });
  }
  
  /**

    if (tr) {
      tr.remove();
      const count = document.querySelectorAll("#receipt-batch-tbody tr").length;
      document.getElementById("receipt-batch-count").textContent = count;
    }
  }
  
  /**
   * レシート一括登録の確定
   */
  function confirmReceiptBatchImport() {
    const tbody = document.getElementById("receipt-batch-tbody");
    const rows = tbody.querySelectorAll("tr");
    if (rows.length === 0) {
      alert("登録するレシートデータがありません。");
      return;
    }
    
    const btn = document.getElementById("receipt-batch-import-btn");
    btn.disabled = true;
    btn.textContent = "登録中...";
    
    const txList = [];
    let hasError = false;
    
    rows.forEach(function(row) {
      const title = row.querySelector(".batch-title").value.trim();
      const date = row.querySelector(".batch-date").value;
      const category = row.querySelector(".batch-category").value;
      const amount = Number(row.querySelector(".batch-amount").value) || 0;
      const paidBy = row.querySelector(".batch-paid-by").value;
      const splitType = row.querySelector(".batch-split-type").value;
      
      // 選択されている負担メンバーを取得してカンマ区切りにする
      const checkedBens = Array.from(row.querySelectorAll(".batch-beneficiary-chk:checked")).map(function(chk) {
        return chk.value;
      });
      const beneficiaries = checkedBens.join(",");
      
      if (!title || !date || !paidBy || !splitType) {
        hasError = true;
      }
      
      txList.push({
        date: date,
        title: title,
        category: category,
        amount: amount,
        paid_by: paidBy,
        split_type: splitType,
        beneficiaries: beneficiaries,
        memo: "レシート一括読込"
      });
    });
    
    if (hasError) {
      alert("入力されていない項目があります。すべての項目を入力してください。");
      btn.disabled = false;
      btn.textContent = "一括登録";
      return;
    }
    
    google.script.run
      .withSuccessHandler(function(res) {

  function clearAllFilters() {

    if (filterCategoryChips) {
      filterCategoryChips.setValue('');

    if (filterPaidByChips) {
      filterPaidByChips.setValue('');
    }
    
    renderActiveFilters();
    if (appData && appData.transactions) {
      updateHistoryTable(filterTransactions(appData.transactions));
    }
  }

  function removeSingleFilter(type, value) {
    if (type === 'categories') {
      activeFilters.categories = activeFilters.categories.filter(c => c !== value);
      if (filterCategoryChips) {
        filterCategoryChips.setValue(activeFilters.categories.join(','));
      }
    } else if (type === 'paidBy') {
      activeFilters.paidBy = activeFilters.paidBy.filter(p => p !== value);
      if (filterPaidByChips) {
        filterPaidByChips.setValue(activeFilters.paidBy.join(','));
      }
    }
    
    renderActiveFilters();
    if (appData && appData.transactions) {
      updateHistoryTable(filterTransactions(appData.transactions));
    }
  }

  function filterTransactions(transactions) {
    if (!transactions) return [];
    
    const hasCategoryFilter = activeFilters.categories.length > 0;
    const hasPaidByFilter = activeFilters.paidBy.length > 0;
    
    if (!hasCategoryFilter && !hasPaidByFilter) {
      return transactions;
    }
    
    return transactions.filter(tx => {
      const matchCategory = !hasCategoryFilter || activeFilters.categories.includes(tx.category);
      const matchPaidBy = !hasPaidByFilter || activeFilters.paidBy.includes(tx.paid_by);
      return matchCategory && matchPaidBy;
    });
  }

  function formatJapaneseDate(dateStr) {
    if (!dateStr) return "";
    const str = String(dateStr);
    // yyyy-MM-dd もしくは yyyy/MM/dd 形式の場合、タイムゾーンの影響を避けるため手動でパースする
    const parts = str.split(/[-/]/);
    if (parts.length === 3) {
      const year = parseInt(parts[0], 10);
      const month = parseInt(parts[1], 10);
      const day = parseInt(parts[2], 10);
      if (!isNaN(year) && !isNaN(month) && !isNaN(day)) {
        return `${year}年${month}月${day}日`;
      }
    }
    // フォールバック
    const date = new Date(str.replace(/-/g, "/"));
    const year = date.getFullYear();
    const month = date.getMonth() + 1;
    const day = date.getDate();
    return `${year}年${month}月${day}日`;
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function escapeJsStr(str) {
    if (!str) return "";
    return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
  }
