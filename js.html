  /**
   * 月次帳簿と年間ダッシュボードのタブ切り替え
   */
  function switchView(viewType) {
    const tabMonthly = document.getElementById("tab-monthly");
    const tabYearly = document.getElementById("tab-yearly");
    const viewMonthly = document.getElementById("monthly-view");
    const viewYearly = document.getElementById("yearly-view");

    if (viewType === 'monthly') {
      tabMonthly.classList.add("active");
      tabYearly.classList.remove("active");
      viewMonthly.classList.add("active");
      viewYearly.classList.remove("active");

      // ダッシュボードから月次への遷移時の「年月」同期処理
      const today = new Date();
      const todayYear = today.getFullYear();
      const todayMonth = ("0" + (today.getMonth() + 1)).slice(-2);

      if (currentYear === todayYear) {
        // 現在の現実の日付と同じ年の場合：現在の日付の月次のページ
        currentMonth = `${todayYear}-${todayMonth}`;
        AppLogger.log("UI", `ダッシュボードから月次へ切り替え: 表示年が現在の現実の年（${todayYear}年）と同一のため、当月（${currentMonth}）に設定します。`);
      } else {
        // それ以外の場合：ダッシュボードで開いている年の12月のページ
        currentMonth = `${currentYear}-12`;
        AppLogger.log("UI", `ダッシュボードから月次へ切り替え: 表示年が現在の現実の年（${todayYear}年）と異なるため、ダッシュボード年の12月（${currentMonth}）に設定します。`);
      }

      // インプット要素と表示表示を更新
      document.getElementById("month-input").value = currentMonth;
      if (typeof window.updateMonthPickerDisplay === "function") {
        window.updateMonthPickerDisplay();
      }

      // 編集モードを抜ける
      cancelEdit();

      loadData();
    } else if (viewType === 'yearly') {
      tabMonthly.classList.remove("active");
      tabYearly.classList.add("active");
      viewMonthly.classList.remove("active");
      viewYearly.classList.add("active");

      // 月次からダッシュボードへの遷移時の「年」同期処理
      const targetYear = parseInt(currentMonth.split("-")[0]);
      currentYear = targetYear;
      
      AppLogger.log("UI", `月次からダッシュボードへ切り替え: 月次の表示年（${targetYear}年）にダッシュボードの年を同期します。`);
      document.getElementById("yearly-year-display").textContent = currentYear + "年";

      loadYearlyData();
    }
  }

  /**
   * 年の切り替え調整
   */
  function adjustYear(diff) {
    currentYear += diff;
    document.getElementById("yearly-year-display").textContent = currentYear + "年";
    loadYearlyData();
  }

  let activePrefetchYear = null;
  let prefetchPendingYear = null;
  let prefetchYearSuccessCallback = null;

  /**
   * サーバーから年間データをロード（キャッシュ対応 ＆ SWRパターン）
   */
  function loadYearlyData() {
    AppLogger.log("UI", `${currentYear}年の年間データ取得を開始します。`);
    document.getElementById("yearly-year-display").textContent = currentYear + "年";
    
    const cacheObj = getCacheFromStorage();
    if (cacheObj.clientDbLastUpdated) {
      clientDbLastUpdated = cacheObj.clientDbLastUpdated;
    }

    let isFromCacheApplied = false;
    const cachedEntry = cacheObj.yearlyCache[String(currentYear)];

    if (cachedEntry && cachedEntry.timestamp === clientDbLastUpdated) {
      AppLogger.log("DATABASE", `${currentYear}年の有効な年間キャッシュが見つかりました。キャッシュから仮ロードします。`, { timestamp: clientDbLastUpdated });
      onYearlyDataLoaded(cachedEntry.data, true);
      isFromCacheApplied = true;
    } else if (cachedEntry) {
      AppLogger.log("DATABASE", `${currentYear}年の年間キャッシュは存在しますが、タイムスタンプが古い、または不一致です。`, { cacheTs: cachedEntry.timestamp, clientDbLastUpdated });
    }

    // 表示年のバックグラウンド・スタンプチェック (SWR: Stale-While-Revalidate)
    if (isFromCacheApplied) {
      AppLogger.log("DATABASE", `${currentYear}年: 年間キャッシュを仮表示しました。バックグラウンドで最新タイムスタンプを確認します...`);
      const checkedYear = String(currentYear);
      
      startSyncAnimation('syncing');
      
      google.script.run
        .withSuccessHandler(function(serverTs) {
          stopSyncAnimation();
          if (checkedYear !== String(currentYear)) {
            AppLogger.log("SYSTEM", `年間タイムスタンプ確認中に表示年が ${checkedYear} から ${currentYear} に変更されたため、結果を破棄します。`);
            return;
          }
          if (serverTs && clientDbLastUpdated && serverTs !== clientDbLastUpdated) {
            AppLogger.log("DATABASE", `年間タイムスタンプ差異検知: サーバーの最新スタンプ（${serverTs}）とローカル（${clientDbLastUpdated}）に差異があります。キャッシュを廃棄して年間データを再取得します。`);
            clearAllCache();
            fetchYearlyDataFromServerDirectly();
          } else {
            AppLogger.log("DATABASE", `年間タイムスタンプ確認完了: サーバーとの差異はありませんでした。年間キャッシュは最新です。`);
          }
        })
        .withFailureHandler(function(err) {
          stopSyncAnimation();
          console.warn("Failed to check yearly timestamp from background: " + err.message);
        })
        .getLatestTimestamp();
        
      return;
    }

    fetchYearlyDataFromServerDirectly();
  }

  function fetchYearlyDataFromServerDirectly() {
    const targetYearStr = String(currentYear);
    if (activePrefetchYear === targetYearStr) {
      AppLogger.log("API", `${targetYearStr}年は現在プリフェッチ中のため、通信の完了を待機します。`);
      prefetchPendingYear = targetYearStr;
      prefetchYearSuccessCallback = function(data) {
        AppLogger.log("API", `${targetYearStr}年のプリフェッチ待機が完了し、データを適用します。`);
        onYearlyDataLoaded(data);
      };
      return;
    }

    prefetchPendingYear = null;
    prefetchYearSuccessCallback = null;

    AppLogger.log("API", `サーバーから ${targetYearStr}年の年間データを取得中...`);
    google.script.run
      .withSuccessHandler(function(response) {
        AppLogger.log("API", `サーバーから ${targetYearStr}年の年間データを正常に取得しました。`);
        onYearlyDataLoaded(response);
      })
      .withFailureHandler(err => {
        AppLogger.log("ERROR", `${targetYearStr}年の年間データ取得に失敗しました。`, err);
        alert("年間データの取得に失敗しました: " + err.message);
      })
      .getYearlyData(targetYearStr);
  }

  /**
   * 年間データ取得成功時の処理
   */
  function onYearlyDataLoaded(response, isFromCache = false) {
    AppLogger.log("UI", `${response.year}年の年間データを画面に描画します。ソース: ${isFromCache ? 'キャッシュ' : 'サーバー'}`);
    
    if (!response) {
      alert("年間データの取得に失敗しました（サーバーからの応答がありません）。");
      return;
    }
    if (!response.success) {
      alert("エラーが発生しました: " + response.message);
      return;
    }

    yearlyData = response;

    if (!isFromCache) {
      saveYearlyDataToCache(response.year, response);
    }

    const total = response.analysis.totalExpense;
    document.getElementById("yearly-stat-total").textContent = `¥${total.toLocaleString()}`;
    
    // 取引実績（合計支出が0より大きい）のある月数をカウント
    const activeMonths = response.monthlyData.filter(d => d.total > 0).length;
    const avg = activeMonths > 0 ? Math.round(total / activeMonths) : 0;
    document.getElementById("yearly-stat-average").textContent = `¥${avg.toLocaleString()}`;

    updateYearlyCharts(response);
    updateYearlyTables(response);

    // ダッシュボード表示中の場合、前後1年のデータをプリフェッチする
    const tabYearly = document.getElementById("tab-yearly");
    if (tabYearly && tabYearly.classList.contains("active")) {
      prefetchYears(String(currentYear));
    }
  }

  // 年間データの優先順位付きプリフェッチ (Offsets: [-1, 1])
  function prefetchYears(baseYearStr) {
    const offsets = [ -1, 1 ];
    let idx = 0;
    
    AppLogger.log("API", `${baseYearStr}年を起点とする年間データ（${offsets.join(', ')}年）のプリフェッチ処理を開始します。`);

    function next() {
      if (String(currentYear) !== baseYearStr) {
        AppLogger.log("SYSTEM", `表示年が変更されたため、${baseYearStr}年を起点とする年間プリフェッチを中断します。`);
        return;
      }
      if (idx >= offsets.length) {
        activePrefetchYear = null;
        AppLogger.log("SYSTEM", "年間データのプリフェッチ処理がすべて完了しました。");
        return;
      }

      const offset = offsets[idx];
      idx++;

      const targetYear = String(parseInt(baseYearStr) + offset);

      const cacheObj = getCacheFromStorage();
      const cached = cacheObj.yearlyCache[targetYear];
      if (cached && cached.timestamp === clientDbLastUpdated) {
        AppLogger.log("DATABASE", `${targetYear}年はすでに最新の年間キャッシュが存在するため、プリフェッチをスキップします。`);
        next();
        return;
      }

      activePrefetchYear = targetYear;
      AppLogger.log("API", `${targetYear}年の年間データ プリフェッチ（バックグラウンド取得）を開始します...`);

      google.script.run
        .withSuccessHandler(function(response) {
          if (response && response.success) {
            AppLogger.log("API", `${targetYear}年の年間データ プリフェッチに成功しました。キャッシュに保存します。`);
            saveYearlyDataToCache(targetYear, response);
            if (prefetchPendingYear === targetYear && prefetchYearSuccessCallback) {
              AppLogger.log("API", `${targetYear}年は現在表示要求中のため、待機中のコールバックを実行して即時描画します。`);
              const cb = prefetchYearSuccessCallback;
              prefetchPendingYear = null;
              prefetchYearSuccessCallback = null;
              cb(response);
            }
          } else {
            AppLogger.log("ERROR", `${targetYear}年の年間データ プリフェッチレスポンスが異常です。`, response);
          }
          next();
        })
        .withFailureHandler(function(err) {
          AppLogger.log("ERROR", `${targetYear}年の年間データ プリフェッチ通信に失敗しました。`, err);
          next();
        })
        .getYearlyData(targetYear);
    }

    next();
  }

  // 現在開いている月の「年」の年間データをプリフェッチする
  function prefetchYearOfCurrentMonth() {
    const targetYear = currentMonth.split("-")[0];
    const cacheObj = getCacheFromStorage();
    const cached = cacheObj.yearlyCache[targetYear];
    
    if (cached && cached.timestamp === clientDbLastUpdated) {
      AppLogger.log("DATABASE", `月次閲覧中: ${targetYear}年の年間データはすでに最新のキャッシュが存在するため、プリフェッチをスキップします。`);
      return;
    }

    AppLogger.log("API", `月次閲覧中: ${targetYear}年の年間データのプリフェッチ（バックグラウンド取得）を開始します...`);
    
    activePrefetchYear = targetYear;
    
    google.script.run
      .withSuccessHandler(function(response) {
        if (response && response.success) {
          AppLogger.log("API", `月次閲覧中: ${targetYear}年の年間データ プリフェッチに成功しました。キャッシュに保存します。`);
          saveYearlyDataToCache(targetYear, response);
        } else {
          AppLogger.log("ERROR", `月次閲覧中: ${targetYear}年の年間データ プリフェッチレスポンスが異常です。`, response);
        }
        if (activePrefetchYear === targetYear) {
          activePrefetchYear = null;
        }
      })
      .withFailureHandler(function(err) {
        AppLogger.log("ERROR", `月次閲覧中: ${targetYear}年の年間データ プリフェッチ通信に失敗しました。`, err);
        if (activePrefetchYear === targetYear) {
          activePrefetchYear = null;
        }
      })
      .getYearlyData(targetYear);
  }

  /**
   * 年間グラフの更新
   */
  function updateYearlyCharts(response) {
    const trendCtx = document.getElementById("yearlyTrendChart").getContext("2d");
    const catCtx = document.getElementById("yearlyCategoryChart").getContext("2d");

    const labels = response.monthlyData.map(d => d.month);
    
    const themeColors = getChartThemeColors();
    const colors = ['#2eaadc', '#ae3ec9', '#37b24d', '#f76707', '#f59f00', '#f03e3e'];
    const datasets = response.users.map((user, idx) => {
      return {
        label: user + "が支払",
        data: response.monthlyData.map(d => d.paidBy[user] || 0),
        backgroundColor: colors[idx % colors.length],
        borderWidth: 1,
        borderColor: themeColors.cardBg
      };
    });

    if (yearlyTrendChart) {
      yearlyTrendChart.destroy();
    }

    yearlyTrendChart = new Chart(trendCtx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: datasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'top',
            labels: {
              color: themeColors.text,
              font: { size: 10, family: 'Inter' }
            }
          },
          tooltip: {
            mode: 'index',
            intersect: false,
            callbacks: {
              label: function(context) {
                const val = context.raw || 0;
                return `${context.dataset.label}: ¥${val.toLocaleString()}`;
              }
            }
          }
        },
        scales: {
          x: {
            stacked: true,
            grid: { color: themeColors.grid },
            ticks: { color: themeColors.text }
          },
          y: {
            stacked: true,
            grid: { color: themeColors.grid },
            ticks: {
              color: themeColors.text,
              callback: function(value) {
                return '¥' + value.toLocaleString();
              }
            }
          }
        }
      }

  /**
   * 数式の評価（安全なeval代替）
   */
  function evaluateMathExpression(expr) {
    if (!expr) return null;
    let sanitized = expr.replace(/×/g, '*').replace(/÷/g, '/');
    sanitized = sanitized.replace(/[^0-9+\-*/().\s]/g, '');
    if (!sanitized) return null;
    
    try {
      const result = Function('"use strict";return (' + sanitized + ')')();
      if (typeof result === 'number' && !isNaN(result) && isFinite(result)) {
        return Math.round(result);
      }
    } catch (e) {
      // ignore errors
    }
    return null;
  }

  // ==========================================
  // CSVインポート管理
  // ==========================================
  let parsedCsvTransactions = [];

  function handleCsvUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
      const text = e.target.result;
      try {
        const rows = parseCSV(text);
        if (rows.length < 2) {
          alert("CSVファイルが空か、データが含まれていません。");
          return;
        }
        
        const headerRow = rows[0].map(h => h.trim());
        const colName = headerRow.indexOf("名前");
        const colDate = headerRow.indexOf("日付");
        const colCategory = headerRow.indexOf("項目");
        const colPayer = headerRow.indexOf("支払い");
        const colAmount = headerRow.indexOf("金額");
        const colSplit = headerRow.indexOf("立替");
        
        if (colName === -1 || colDate === -1 || colCategory === -1 || colPayer === -1 || colAmount === -1 || colSplit === -1) {
          alert("CSVのヘッダーに必要な項目（名前, 日付, 項目, 支払い, 金額, 立替）が含まれていません。");
          return;
        }
        
        parsedCsvTransactions = [];
        const previewTbody = document.getElementById("csv-preview-tbody");
        previewTbody.innerHTML = "";
        
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          if (row.length < 6 || row.every(val => val.trim() === "")) continue;
          
          const title = (row[colName] || "").trim();
          const rawDate = (row[colDate] || "").trim();
          const category = (row[colCategory] || "").trim();
          const paidBy = (row[colPayer] || "").trim();
          const rawAmount = (row[colAmount] || "").trim();
          const splitText = (row[colSplit] || "").trim();
          
          const date = convertJapaneseDateToISO(rawDate);
          const amount = Number(rawAmount.replace(/,/g, "")) || 0;
          
          let splitType = "割り勘";
          let beneficiaries = "";
          
          if (splitText === "割り勘") {
            splitType = "割り勘";
            beneficiaries = "";
          } else if (splitText === "個別" || splitText.includes("自己負担")) {
            splitType = "個別";
            beneficiaries = paidBy;
          } else {
            const matchFront = splitText.match(/(.+)の分/);
            if (matchFront) {
              splitType = "立て替え";
              beneficiaries = matchFront[1].trim();
            } else {
              splitType = "割り勘";
              beneficiaries = "";
            }
          }
          
          if (!title || !date || amount <= 0 || !paidBy) {
            console.warn(`無効な行スキップ: 行番号 ${i + 1}, タイトル: ${title}, 日付: ${date}, 金額: ${amount}`);
            continue;
          }
          
          const tx = {
            date: date,
            title: title,
            category: category,
            amount: amount,
            paid_by: paidBy,
            split_type: splitType,
            beneficiaries: splitType === "個別" ? paidBy : beneficiaries,
            memo: "CSVインポート"
          };
          
          parsedCsvTransactions.push(tx);
          
          // プレビュー行の追加
          const tr = document.createElement("tr");
          let splitBadge = `<span class="badge badge-split">👥 割り勘</span>`;
          if (splitType === "立て替え") {
            splitBadge = `<span class="badge badge-fronting">🙋‍♂️ 立て替え</span>`;
          } else if (splitType === "個別") {
            splitBadge = `<span class="badge badge-individual">👤 個別</span>`;
          }
          
          let benBadge = `<span class="badge badge-split">全員</span>`;
          if (splitType === "個別") {
            benBadge = `<span class="badge badge-individual">${paidBy}</span>`;
          } else if (beneficiaries) {
            benBadge = `<span class="badge badge-fronting">${beneficiaries}</span>`;
          }
          
          tr.innerHTML = `
            <td><div style="font-weight: 500;">${escapeHtml(title)}</div></td>
            <td style="color: var(--text-secondary);">${formatJapaneseDate(date)}</td>
            <td><span class="badge badge-category">${escapeHtml(category)}</span></td>
            <td><span class="badge badge-user">${escapeHtml(paidBy)}</span></td>
            <td class="text-right amount-val">¥${amount.toLocaleString()}</td>
            <td>${splitBadge}</td>
            <td>${benBadge}</td>
          `;
          previewTbody.appendChild(tr);
        }
        
        if (parsedCsvTransactions.length === 0) {
          alert("取り込める有効な取引データが見つかりませんでした。");
          return;
        }
        
        document.getElementById("csv-import-count").textContent = parsedCsvTransactions.length;
        openModal("csv-preview-modal");
        lucide.createIcons();
      } catch (err) {
        alert("CSVのパース中にエラーが発生しました: " + err.message);
      } finally {
        event.target.value = ""; // リセット
      }
    };
    reader.readAsText(file, "UTF-8");
  }

    if (parsedCsvTransactions.length === 0) return;

  // CSVパース (RFC 4180簡易準拠)
  function parseCSV(text) {
    const lines = [];
    let row = [""];
    let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      const next = text[i+1];
      if (c === '"') {
        if (inQuotes && next === '"') {
          row[row.length - 1] += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (c === ',' && !inQuotes) {
        row.push('');
      } else if ((c === '\r' || c === '\n') && !inQuotes) {
        if (c === '\r' && next === '\n') {
          i++;
        }
        lines.push(row);
        row = [''];
      } else {
        row[row.length - 1] += c;
      }
    }
    if (row.length > 1 || row[0] !== '') {
      lines.push(row);
    }
    return lines;
  }

  // 和暦や「年月日」形式の日付文字列を YYYY-MM-DD に統一
  function convertJapaneseDateToISO(jpDateStr) {
    const cleanStr = String(jpDateStr).trim();
    const matchJp = cleanStr.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
    if (matchJp) {
      const y = matchJp[1];
      const m = ("0" + matchJp[2]).slice(-2);
      const d = ("0" + matchJp[3]).slice(-2);
      return `${y}-${m}-${d}`;
    }
    const matchIso = cleanStr.match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
    if (matchIso) {
      const y = matchIso[1];
      const m = ("0" + matchIso[2]).slice(-2);
      const d = ("0" + matchIso[3]).slice(-2);
      return `${y}-${m}-${d}`;
    }
    return "";
  }

  /**
   * ステータス値が「支払い済み」扱いかどうかを判定する
   */
  function isPaidStatus(status, masters) {
    if (!status) return false;
    const statuses = masters && masters.settlement_statuses ? masters.settlement_statuses : ["未払い", "支払い済み"];
    
    if (statuses.length > 0 && status === statuses[0]) {
      return false;
    }
    if (status === "支払い済み" || status.indexOf("済") !== -1 || status.indexOf("完了") !== -1) {
      return true;
    }
    return true;
  }

  /**
   * アコーディオンの開閉トグル
   */
  function toggleAccordion(id) {
    const item = document.getElementById(`accordion-item-${id}`);
    if (!item) return;
    
    const isActive = item.classList.contains("active");
    
    // 画面の圧迫を防ぐため、他の開いているアコーディオンを閉じる
    const allItems = document.querySelectorAll(".settlement-accordion-item");
    allItems.forEach(function(el) {
      el.classList.remove("active");
    });
    
    if (!isActive) {
      item.classList.add("active");
    }
  }

  function openSettlementModal(id) {
    if (!appData) return;
    
    const analysis = appData.analysis;
    const masters = appData.masters;
    
    // 対象月の設定
    const activeMonth = appData.month || "";

    const monthNum = parseInt(monthParts[1], 10);

    // ID設定
    document.getElementById("settle-id-input").value = id;
    
    const deleteBtn = document.getElementById("settle-delete-btn");
    
    let record = null;
    if (id && appData.settlementRecords) {
      record = appData.settlementRecords.find(r => r.id === id);
    }
    
    if (record) {
      // 編集モード
      if (deleteBtn) deleteBtn.style.display = "block";
      
      document.getElementById("settle-status-input").value = record.status || "未払い";
      onSettleStatusChange(record.status || "未払い");
      
      const dateInput = document.getElementById("settle-date-input");
      const dateVal = record.payment_date ? record.payment_date.substring(0, 10) : getTodayDateString();
      dateInput.value = dateVal;
      const displayInput = document.getElementById("settle-date-display-input");
      if (displayInput) {
        displayInput.value = dateVal ? dateVal.replace(/-/g, "/") : "";
      }
      
      document.getElementById("settle-pattern-input").value = record.payment_pattern || "";
      document.getElementById("settle-amount-input").value = record.amount || "";
      document.getElementById("settle-method-input").value = record.payment_method || "";
      document.getElementById("settle-memo-input").value = record.memo || "";
    } else {
      // 新規登録モード
      if (deleteBtn) deleteBtn.style.display = "none";
      
      const statusInput = document.getElementById("settle-status-input");
      const defaultStatus = masters && masters.settlement_statuses && masters.settlement_statuses.length > 0 ? masters.settlement_statuses[0] : "未払い";
      statusInput.value = defaultStatus;
      onSettleStatusChange(defaultStatus);
      
      const dateVal = getTodayDateString();
      document.getElementById("settle-date-input").value = dateVal;
      const displayInput = document.getElementById("settle-date-display-input");
      if (displayInput) {
        displayInput.value = dateVal ? dateVal.replace(/-/g, "/") : "";
      }
      document.getElementById("settle-method-input").value = "";
      document.getElementById("settle-memo-input").value = "";
      
      // 自動補完：未払いの送金指示（精算指示）があり、まだ登録されていないものをデフォルトセット
      let defaultPattern = "";
      let defaultAmount = "";
      if (analysis && analysis.settlementInstructions && analysis.settlementInstructions.length > 0) {
        // すでに登録されているパターンの一覧
        const registeredPatterns = (appData.settlementRecords || []).map(r => r.payment_pattern);
        
        // 未登録の最初の精算指示を探す
        const nextInstruction = analysis.settlementInstructions.find(ins => {
          const pat = `${ins.from}から${ins.to}へ`;
          return registeredPatterns.indexOf(pat) === -1;
        }) || analysis.settlementInstructions[0];
        
        if (nextInstruction) {
          defaultPattern = `${nextInstruction.from}から${nextInstruction.to}へ`;
          defaultAmount = nextInstruction.amount;
        }
      }
      
      document.getElementById("settle-pattern-input").value = defaultPattern;
      document.getElementById("settle-amount-input").value = defaultAmount;
    }
    
    openModal("settlement-status-modal");
  }

  function getTodayDateString() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  /**
   * モーダル内のステータス変更イベント
   */
  function onSettleStatusChange(value) {
    const detailsArea = document.getElementById("settle-details-area");
    if (!detailsArea) return;
    
    const isPaid = isPaidStatus(value, appData ? appData.masters : null);
    
    if (isPaid) {
      detailsArea.style.display = "flex";
      document.getElementById("settle-date-display-input").required = true;
      document.getElementById("settle-pattern-input").required = true;
      document.getElementById("settle-amount-input").required = true;
      document.getElementById("settle-method-input").required = true;
    } else {
      detailsArea.style.display = "none";
      document.getElementById("settle-date-display-input").required = false;
      document.getElementById("settle-pattern-input").required = false;
      document.getElementById("settle-amount-input").required = false;
      document.getElementById("settle-method-input").required = false;
    }
  }

  /**
   * 清算状況の保存処理
   */
  function submitSettlementStatus(event) {
    event.preventDefault();
    if (!appData) return;
    
    const saveBtn = event.target.querySelector('button[type="submit"]');
    const originalText = saveBtn.textContent;
    saveBtn.disabled = true;
    saveBtn.textContent = "保存中...";
    
    const id = document.getElementById("settle-id-input").value;
    const status = document.getElementById("settle-status-input").value;
    const isPaid = isPaidStatus(status, appData.masters);
    
    const data = {
      id: id,
      month: appData.month,
      status: status,
      payment_date: isPaid ? document.getElementById("settle-date-input").value : "",
      payment_pattern: isPaid ? document.getElementById("settle-pattern-input").value : "",
      amount: isPaid ? Number(document.getElementById("settle-amount-input").value) || 0 : 0,
      payment_method: isPaid ? document.getElementById("settle-method-input").value : "",
      memo: document.getElementById("settle-memo-input").value.trim()
    };
    
    google.script.run
      .withSuccessHandler(res => {
        saveBtn.disabled = false;
        saveBtn.textContent = originalText;
        closeModal("settlement-status-modal");
        
        if (res.success) {
          alert("精算記録を保存しました！");
          clearAllCache();
          loadData(); // 画面リロード
        } else {
          alert("保存に失敗しました: " + res.message);
        }
      })
      .withFailureHandler(err => {
        saveBtn.disabled = false;
        saveBtn.textContent = originalText;
        alert("通信エラーが発生しました: " + err.message);
      })
      .saveSettlementStatus(data);
  }

  /**
   * モーダル内からの精算記録削除処理
   */
  function deleteSettlementStatusFromModal() {
    const id = document.getElementById("settle-id-input").value;
    if (!id) return;
    closeModal("settlement-status-modal");
    deleteSettlementStatus(id);
  }

  /**
   * 精算記録の削除実行
   */
  function deleteSettlementStatus(id) {
    if (!confirm("この精算記録を削除してもよろしいですか？\nこの操作は取り消せません。")) return;
    
    google.script.run
      .withSuccessHandler(res => {
        if (res.success) {
          alert("精算記録を削除しました。");
          clearAllCache();
          loadData();
        } else {
          alert("削除に失敗しました: " + res.message);
        }
      })
      .withFailureHandler(err => {
        alert("通信エラーが発生しました: " + err.message);
      })
      .deleteSettlementStatus(id);
  }

  // ==========================================
  // Google Drive ファイル選択機能
  // ==========================================
  let driveFilesCache = []; // 取得したファイルのキャッシュ
  let selectedDriveFileId = null;
  let currentDriveFilter = "all";

  function openDriveFilePicker() {
    openModal('drive-picker-modal');
    
    // UI初期化
    document.getElementById("drive-search-input").value = "";
    document.getElementById("drive-picker-submit").disabled = true;
    selectedDriveFileId = null;
    currentDriveFilter = "all";
    updateFilterBtnActiveState();
    
    showDriveLoading(true);
    google.script.run
      .withSuccessHandler(function(response) {
        showDriveLoading(false);
        if (response.success) {
          driveFilesCache = response.files;
          renderDriveFiles();
        } else {
          alert(response.message);
        }
      })
      .withFailureHandler(function(err) {
        showDriveLoading(false);
        alert("Googleドライブとの通信に失敗しました: " + err.message);
      })
      .getRecentDriveFiles();
  }

  function showDriveLoading(isLoading) {
    const listEl = document.getElementById("drive-file-list");
    const loadingEl = document.getElementById("drive-picker-loading");
    const emptyEl = document.getElementById("drive-picker-empty");
    
    if (isLoading) {
      listEl.style.display = "none";
      loadingEl.style.display = "flex";
      emptyEl.style.display = "none";
    } else {
      listEl.style.display = "flex";
      loadingEl.style.display = "none";
    }
  }

  function renderDriveFiles() {
    const listEl = document.getElementById("drive-file-list");
    const emptyEl = document.getElementById("drive-picker-empty");
    listEl.innerHTML = "";
    
    // フィルタリング
    let filtered = driveFilesCache;
    if (currentDriveFilter === "pdf") {
      filtered = driveFilesCache.filter(f => f.mimeType === "application/pdf");
    } else if (currentDriveFilter === "image") {
      filtered = driveFilesCache.filter(f => f.mimeType !== "application/pdf");
    }
    
    if (filtered.length === 0) {
      emptyEl.style.display = "block";
      return;
    }
    emptyEl.style.display = "none";
    
    filtered.forEach(function(file) {
      const isPdf = file.mimeType === "application/pdf";
      const iconClass = isPdf ? "file-icon-pdf" : "file-icon-image";
      const iconName = isPdf ? "file-text" : "image";
      const dateStr = formatDriveTimestamp(file.lastUpdated);
      
      const itemEl = document.createElement("div");
      itemEl.className = "drive-file-item";
      if (selectedDriveFileId === file.id) {
        itemEl.classList.add("selected");
      }
      
      itemEl.innerHTML = `
        <div class="file-icon-wrapper ${iconClass}">
          <i data-lucide="${iconName}"></i>
        </div>
        <div class="file-details">
          <div class="file-name" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</div>
          <div class="file-date">${dateStr} 更新</div>
        </div>
        <div class="file-selected-indicator">
          <i data-lucide="check-circle-2" style="width: 18px; height: 18px;"></i>
        </div>
      `;
      
      itemEl.addEventListener("click", function() {
        selectDriveFile(file.id);
      });
      
      listEl.appendChild(itemEl);
    });
    
    // Lucideアイコンを再適用
    lucide.createIcons();
  }

  function selectDriveFile(fileId) {
    selectedDriveFileId = fileId;
    
    // 選択ハイライトの切り替え
    const items = document.querySelectorAll("#drive-file-list .drive-file-item");
    const filtered = driveFilesCache.filter(f => {
      if (currentDriveFilter === "pdf") return f.mimeType === "application/pdf";
      if (currentDriveFilter === "image") return f.mimeType !== "application/pdf";
      return true;
    });
    
    items.forEach((item, index) => {
      const file = filtered[index];
      if (file && file.id === fileId) {
        item.classList.add("selected");
      } else {
        item.classList.remove("selected");
      }
    });
    
    // ボタンの無効化解除
    document.getElementById("drive-picker-submit").disabled = false;
  }

  function searchDriveFiles() {
    const input = document.getElementById("drive-search-input");
    const queryText = input.value.trim();
    
    showDriveLoading(true);
    google.script.run
      .withSuccessHandler(function(response) {
        showDriveLoading(false);
        if (response.success) {
          driveFilesCache = response.files;
          selectedDriveFileId = null;
          document.getElementById("drive-picker-submit").disabled = true;
          renderDriveFiles();
        } else {
          alert(response.message);
        }
      })
      .withFailureHandler(function(err) {
        showDriveLoading(false);
        alert("Googleドライブの検索に失敗しました: " + err.message);
      })
      .searchDriveFiles(queryText);
  }

  function setDriveFilter(type) {
    currentDriveFilter = type;
    updateFilterBtnActiveState();
    renderDriveFiles();
  }

  function updateFilterBtnActiveState() {
    const filters = ["all", "pdf", "image"];
    filters.forEach(f => {
      const btn = document.getElementById("filter-" + f);
      if (btn) {
        if (f === currentDriveFilter) {
          btn.classList.add("active");
        } else {
          btn.classList.remove("active");
        }
      }
    });
  }

  function analyzeSelectedDriveFile() {
    if (!selectedDriveFileId) return;
    
    closeModal('drive-picker-modal');
    
    setTimeout(function() {
      openModal('ocr-loading-modal');
      document.getElementById('ocr-loading-title').textContent = 'Driveからファイルを読込中...';
      document.getElementById('ocr-loading-desc').innerHTML = 'Googleドライブからデータを取得し、Geminiで解析しています。<br>数秒ほどお待ちください。';
    }, 150);
    
    let clientKey = "";
    try {
      const stored = localStorage.getItem("_hk_session_data");
      if (stored) clientKey = atob(stored);
    } catch(e) {}
    
    google.script.run
      .withSuccessHandler(onReceiptAnalyzed)
      .withFailureHandler(onReceiptAnalysisFailed)
      .analyzeDriveReceipt(selectedDriveFileId, clientKey);
  }

  function formatDriveTimestamp(ts) {
    if (!ts) return "";
    const d = new Date(ts);
    return `${d.getFullYear()}/${("0" + (d.getMonth() + 1)).slice(-2)}/${("0" + d.getDate()).slice(-2)} ${("0" + d.getHours()).slice(-2)}:${("0" + d.getMinutes()).slice(-2)}`;
  }

  // グローバルに露出
  window.openSettlementModal = openSettlementModal;
  window.onSettleStatusChange = onSettleStatusChange;
  window.submitSettlementStatus = submitSettlementStatus;
  window.openDriveFilePicker = openDriveFilePicker;
  window.searchDriveFiles = searchDriveFiles;
  window.setDriveFilter = setDriveFilter;
  window.analyzeSelectedDriveFile = analyzeSelectedDriveFile;
  window.selectDriveFile = selectDriveFile;
  window.applyBulkSetting = applyBulkSetting;
  window.removeBatchRow = removeBatchRow;
</script>
