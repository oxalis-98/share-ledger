<style>
  /* ==========================================
   * デザインシステム (シンプルなライト/ダークテーマ)
   * ========================================== */
  :root {
    /* デフォルト：ダークテーマ */
    --bg-app: #191919;
    --bg-card: #202020;
    --bg-input: #252525;
    --bg-hover: #2c2c2c;
    --border-color: rgba(255, 255, 255, 0.09);
    
    --text-primary: #eaeaea;
    --text-secondary: #9b9b9b;
    --text-disabled: #555555;
    --text-muted: rgba(255, 255, 255, 0.15);
    
    --accent-blue: #2eaadc;
    --accent-green: #37b24d;
    --accent-orange: #f76707;
    --accent-purple: #ae3ec9;
    --accent-red: #f03e3e;
    
    --text-sat: #4dabf7;
    --text-sun: #ff8787;
    
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    
    --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    
    --filter-icon: invert(1);
    --shadow-popup: 0 10px 25px rgba(0, 0, 0, 0.5);
    
    /* 細部のテーマ変数 */
    --border-subtle: rgba(255, 255, 255, 0.04);
    --bg-table-header: rgba(255, 255, 255, 0.02);
    --bg-table-hover: rgba(255, 255, 255, 0.02);
    
    --badge-individual-bg: rgba(255, 255, 255, 0.05);
    --badge-individual-border: rgba(255, 255, 255, 0.1);
    
    --bg-settlement-item: rgba(255, 255, 255, 0.02);
    --border-spinner: rgba(255, 255, 255, 0.1);
    
    --bg-calc-btn: rgba(255, 255, 255, 0.03);
    --bg-calc-btn-hover: rgba(255, 255, 255, 0.08);
    --border-calc-btn: rgba(255, 255, 255, 0.2);
  }

  /* システム設定がライトモードの場合 */
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --bg-app: #f7f7f7;
      --bg-card: #ffffff;
      --bg-input: #f4f4f4;
      --bg-hover: #efefef;
      --border-color: rgba(55, 53, 47, 0.09);
      
      --text-primary: #37352f;
      --text-secondary: #787774;
      --text-disabled: #bcbbba;
      --text-muted: rgba(55, 53, 47, 0.15);
      
      --accent-blue: #0b6e99;
      --accent-green: #2e7d32;
      --accent-orange: #d84315;
      --accent-purple: #7b1fa2;
      --accent-red: #c62828;
      
      --text-sat: #2b6cb0;
      --text-sun: #c53030;
      
      --filter-icon: invert(0);
      --shadow-popup: 0 10px 25px rgba(0, 0, 0, 0.08);
      
      --border-subtle: rgba(55, 53, 47, 0.04);
      --bg-table-header: rgba(55, 53, 47, 0.02);
      --bg-table-hover: rgba(55, 53, 47, 0.02);
      
      --badge-individual-bg: rgba(55, 53, 47, 0.05);
      --badge-individual-border: rgba(55, 53, 47, 0.1);
      
      --bg-settlement-item: rgba(55, 53, 47, 0.02);
      --border-spinner: rgba(55, 53, 47, 0.1);
      
      --bg-calc-btn: rgba(55, 53, 47, 0.03);
      --bg-calc-btn-hover: rgba(55, 53, 47, 0.08);
      --border-calc-btn: rgba(55, 53, 47, 0.2);
    }
  }

  /* 明示的なライトモード override */
  :root[data-theme="light"] {
    --bg-app: #f7f7f7;
    --bg-card: #ffffff;
    --bg-input: #f4f4f4;
    --bg-hover: #efefef;
    --border-color: rgba(55, 53, 47, 0.09);
    
    --text-primary: #37352f;
    --text-secondary: #787774;
    --text-disabled: #bcbbba;
    --text-muted: rgba(55, 53, 47, 0.15);
    
    --accent-blue: #0b6e99;
    --accent-green: #2e7d32;
    --accent-orange: #d84315;
    --accent-purple: #7b1fa2;
    --accent-red: #c62828;
    
    --text-sat: #2b6cb0;
    --text-sun: #c53030;
    
    --filter-icon: invert(0);
    --shadow-popup: 0 10px 25px rgba(0, 0, 0, 0.08);
    
    --border-subtle: rgba(55, 53, 47, 0.04);
    --bg-table-header: rgba(55, 53, 47, 0.02);
    --bg-table-hover: rgba(55, 53, 47, 0.02);
    
    --badge-individual-bg: rgba(55, 53, 47, 0.05);
    --badge-individual-border: rgba(55, 53, 47, 0.1);
    
    --bg-settlement-item: rgba(55, 53, 47, 0.02);
    --border-spinner: rgba(55, 53, 47, 0.1);
    
    --bg-calc-btn: rgba(55, 53, 47, 0.03);
    --bg-calc-btn-hover: rgba(55, 53, 47, 0.08);
    --border-calc-btn: rgba(55, 53, 47, 0.2);
  }

  /* 明示的なダークモード override */
  :root[data-theme="dark"] {
    --bg-app: #191919;
    --bg-card: #202020;
    --bg-input: #252525;
    --bg-hover: #2c2c2c;
    --border-color: rgba(255, 255, 255, 0.09);
    
    --text-primary: #eaeaea;
    --text-secondary: #9b9b9b;
    --text-disabled: #555555;
    --text-muted: rgba(255, 255, 255, 0.15);
    
    --accent-blue: #2eaadc;
    --accent-green: #37b24d;
    --accent-orange: #f76707;
    --accent-purple: #ae3ec9;
    --accent-red: #f03e3e;
    
    --text-sat: #4dabf7;
    --text-sun: #ff8787;
    
    --filter-icon: invert(1);
    --shadow-popup: 0 10px 25px rgba(0, 0, 0, 0.5);
    
    --border-subtle: rgba(255, 255, 255, 0.04);
    --bg-table-header: rgba(255, 255, 255, 0.02);
    --bg-table-hover: rgba(255, 255, 255, 0.02);
    
    --badge-individual-bg: rgba(255, 255, 255, 0.05);
    --badge-individual-border: rgba(255, 255, 255, 0.1);
    
    --bg-settlement-item: rgba(255, 255, 255, 0.02);
    --border-spinner: rgba(255, 255, 255, 0.1);
    
    --bg-calc-btn: rgba(255, 255, 255, 0.03);
    --bg-calc-btn-hover: rgba(255, 255, 255, 0.08);
    --border-calc-btn: rgba(255, 255, 255, 0.2);
  }

  /* リセット & ベース */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background-color: var(--bg-app);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* レイアウト */
  .app-container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px;
  }

  /* ヘッダー */
  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 24px;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-emoji {
    font-size: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-emoji svg {
    width: 32px;
    height: 32px;
    display: block;
  }

  .header-logo h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* 月選択 */
  .month-selector-wrapper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    padding: 4px;
    margin-bottom: 16px;
  }

  /* カスタム月選択トリガー */
  .month-picker-trigger {
    display: flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: none;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    user-select: none;
    transition: var(--transition-fast);
  }

  .month-picker-trigger:hover {
    background-color: var(--bg-hover);
  }

  .month-picker-icon {
    width: 16px;
    height: 16px;
    color: var(--text-muted);
  }

  /* カスタム月選択ポップアップ */
  .month-picker-popup {
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    width: 260px;
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-lg);
    z-index: 100;
    padding: 12px;
    display: none; /* JSで active クラスをトグルする */
    flex-direction: column;
    gap: 12px;
  }

  .month-picker-popup.active {
    display: flex;
  }

  /* ポップアップヘッターン選択 */
  .month-picker-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 600;
    color: var(--text-primary);
    font-size: 0.95rem;
  }

  .month-picker-nav-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition-fast);
  }

  .month-picker-nav-btn:hover {
    background-color: var(--bg-hover);
    color: var(--text-primary);
  }

  .month-picker-nav-btn svg {
    width: 16px;
    height: 16px;
  }

  /* 月グリッド (4列×3行) */
  .month-picker-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .month-picker-cell {
    aspect-ratio: 1.5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text-primary);
    transition: var(--transition-fast);
    user-select: none;
    font-weight: 500;
  }

  .month-picker-cell:hover {
    background-color: var(--bg-hover);
  }

  .month-picker-cell.selected {
    background-color: var(--accent-blue) !important;
    color: #ffffff !important;
    font-weight: 600;
  }

  /* ポップアップフッター */
  .month-picker-footer {
    border-top: 1px solid var(--border-color);
    padding-top: 8px;
    display: flex;
    justify-content: flex-end;
  }

  .month-picker-today-btn {
    background: transparent;
    border: none;
    color: var(--accent-blue);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    transition: var(--transition-fast);
  }

  .month-picker-today-btn:hover {
    background-color: var(--bg-hover);
  }

  /* メイングリッド */
  .app-main {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 24px;
  }

  @media (max-width: 1024px) {
    .app-main {
      grid-template-columns: 1fr;
    }
  }

  /* カード・パネル */
  .panel-card {
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 24px;
  }

  .panel-header {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border-subtle);
    padding-bottom: 12px;
  }

  .panel-header h2 {
    font-size: 1.1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-header h2 i {
    width: 18px;
    height: 18px;
    color: var(--accent-blue);
  }

  .flex-between {
    justify-content: space-between;
  }

  /* スタッツグリッド */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 16px;
  }

  .stat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .stat-title {
    color: var(--text-secondary);
    font-size: 0.8rem;
    font-weight: 500;
    text-transform: uppercase;
  }

  .stat-icon {
    width: 16px;
    height: 16px;
  }

  .stat-value {
    font-family: 'Outfit', sans-serif;
    font-size: 1.6rem;
    font-weight: 600;
  }

  /* ボタン */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 10px 16px;
    border-radius: var(--radius-md);
    cursor: pointer;
    border: 1px solid transparent;
    transition: var(--transition-fast);
    outline: none;
  }

  .btn-primary {
    background-color: var(--accent-blue);
    color: #fff;
  }

  .btn-primary:hover {
    background-color: #2190bb;
    transform: translateY(-1px);
  }

  .btn-secondary {
    background-color: var(--bg-input);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
  }

  .btn-secondary:hover {
    background-color: var(--bg-hover);
  }

  .btn-danger {
    background-color: rgba(240, 62, 62, 0.15);
    color: var(--accent-red);
    border: 1px solid rgba(240, 62, 62, 0.2);
  }

  .btn-danger:hover {
    background-color: rgba(240, 62, 62, 0.3);
  }

  .btn-sm {
    padding: 6px 12px;
    font-size: 0.8rem;
  }

  .w-100 {
    width: 100%;
  }

  .icon-btn {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    transition: var(--transition-fast);
  }

  .icon-btn:hover {
    background-color: var(--bg-hover);
    color: var(--text-primary);
  }

  .icon-btn i {
    width: 18px;
    height: 18px;
  }

  /* フォームコントロール */
  .form-group {
    margin-bottom: 16px;
  }

  .form-row {
    display: flex;
    gap: 16px;
  }

  .col-6 {
    flex: 1;
    width: 50%;
  }

  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .required {
    color: var(--accent-red);
  }

  input[type="text"],
  input[type="number"],
  input[type="date"],
  input[type="password"],
  select {
    width: 100%;
    background-color: var(--bg-input);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    font-size: 0.9rem;
    outline: none;
    transition: var(--transition-fast);
    font-family: inherit;
  }

  input[type="text"]:focus,
  input[type="number"]:focus,
  input[type="date"]:focus,
  input[type="password"]:focus,
  select:focus {
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 2px rgba(46, 170, 220, 0.2);
  }

  select {
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%239b9b9b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3E%3C/svg%3E");
    background-position: right 8px center;
    background-repeat: no-repeat;
    background-size: 1.25rem;
    padding-right: 32px;
  }

  .password-input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .password-input-wrapper input {
    padding-right: 40px;
  }

  .password-input-wrapper .icon-btn {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
  }

  .help-text {
    display: block;
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  .help-text a {
    color: var(--accent-blue);
    text-decoration: none;
  }

  .help-text a:hover {
    text-decoration: underline;
  }

  /* 選択チップ (Choice Chips) */
  .choice-chips-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .choice-chip {
    padding: 6px 12px;
    border-radius: 16px; /* 丸みのあるチップ形状 */
    background-color: var(--bg-input);
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    font-size: 0.85rem;
    cursor: pointer;
    transition: var(--transition-fast);
    user-select: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 32px;
  }

  .choice-chip:hover {
    background-color: var(--bg-hover);
    color: var(--text-primary);
    border-color: var(--border-calc-btn);
  }

  .choice-chip.selected {
    background-color: rgba(46, 170, 220, 0.12);
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    font-weight: 500;
  }

  .choice-chip.selected::before {
    content: "✓";
    font-weight: bold;
    margin-right: 6px;
    font-size: 0.9rem;
  }

  /* 取引履歴の適用中フィルターバッジ */
  .active-filters-list {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .active-filter-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
    transition: background-color 0.15s ease, opacity 0.15s ease;
  }

  /* カテゴリ用のアクティブバッジスタイル */
  .active-filter-badge.filter-category {
    background-color: rgba(46, 170, 220, 0.12);
    border: 1px solid rgba(46, 170, 220, 0.3);
    color: var(--accent-blue);
  }
  .active-filter-badge.filter-category:hover {
    background-color: rgba(46, 170, 220, 0.2);
  }

  /* ユーザー用のアクティブバッジスタイル */
  .active-filter-badge.filter-paid_by {
    background-color: rgba(174, 62, 201, 0.12);
    border: 1px solid rgba(174, 62, 201, 0.3);
    color: var(--accent-purple);
  }
  .active-filter-badge.filter-paid_by:hover {
    background-color: rgba(174, 62, 201, 0.2);
  }

  .active-filter-badge .remove-icon {
    font-size: 0.9rem;
    line-height: 1;
    color: var(--text-secondary);
    transition: color 0.15s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 12px;
    height: 12px;
  }
  .active-filter-badge:hover .remove-icon {
    color: var(--accent-red);
  }


  /* シンプルなテーブル */
  .table-responsive {
    overflow-x: auto;
    width: 100%;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
  }

  .ledger-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    text-align: left;
  }

  .ledger-table th,
  .ledger-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-color);
    vertical-align: middle;
    white-space: nowrap;
  }

  .ledger-table th {
    background-color: var(--bg-table-header);
    color: var(--text-secondary);
    font-weight: 500;
  }

  .ledger-table tbody tr {
    transition: var(--transition-fast);
  }

  .ledger-table tbody tr:hover {
    background-color: var(--bg-table-hover);
  }

  .ledger-table td.text-right,
  .ledger-table th.text-right {
    text-align: right;
  }

  .ledger-table td.amount-val {
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
  }

  .action-col {
    width: 40px;
    text-align: center;
  }

  /* カテゴリバッジ */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 500;
    border: 1px solid transparent;
  }

  .badge-category {
    background-color: rgba(46, 170, 220, 0.1);
    color: var(--accent-blue);
    border-color: rgba(46, 170, 220, 0.15);
  }
  
  .badge-user {
    background-color: rgba(174, 62, 201, 0.1);
    color: var(--accent-purple);
    border-color: rgba(174, 62, 201, 0.15);
  }

  .badge-split {
    background-color: rgba(55, 178, 77, 0.1);
    color: var(--accent-green);
    border-color: rgba(55, 178, 77, 0.15);
  }

  .badge-fronting {
    background-color: rgba(247, 103, 7, 0.1);
    color: var(--accent-orange);
    border-color: rgba(247, 103, 7, 0.15);
  }

  .badge-individual {
    background-color: var(--badge-individual-bg);
    color: var(--text-primary);
    border-color: var(--badge-individual-border);
  }

  /* 精算結果カード */
  .settlement-results {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .settlement-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: var(--bg-settlement-item);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    padding: 12px;
    font-size: 0.9rem;
  }

  .settlement-parties {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
  }

  .settlement-amount {
    font-family: 'Outfit', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--accent-orange);
  }

  .settlement-direction-arrow {
    color: var(--text-secondary);
    display: flex;
    align-items: center;
  }

  .settlement-user-pill {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 600;
  }

  .settlement-user-pill.debtor {
    background-color: rgba(240, 62, 62, 0.15);
    color: #ff6b6b;
  }

  .settlement-user-pill.creditor {
    background-color: rgba(55, 178, 77, 0.15);
    color: #51cf66;
  }

  .settlement-empty {
    text-align: center;
    color: var(--text-secondary);
    padding: 16px;
    font-size: 0.85rem;
  }

  .settlement-loading {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  /* スピナー */
  .spinner {
    width: 24px;
    height: 24px;
    border: 3px solid var(--border-spinner);
    border-radius: 50%;
    border-top-color: var(--accent-blue);
    animation: spin 1s ease-in-out infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* グラフコンテナ */
  .chart-container {
    position: relative;
    width: 100%;
    height: 220px;
  }

  /* モーダル */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition-normal);
  }

  .modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .modal-card {
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 480px;
    padding: 24px;
    transform: scale(0.9);
    transition: transform var(--transition-normal);
  }

  .modal-overlay.active .modal-card {
    transform: scale(1);
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .modal-header h3 {
    font-size: 1.2rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .modal-body {
    margin-bottom: 24px;
  }

  .modal-desc {
    color: var(--text-secondary);
    font-size: 0.85rem;
    line-height: 1.4;
    margin-bottom: 16px;
  }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }

  /* OCRロード画面 */
  .ocr-loading-card {
    text-align: center;
    max-width: 400px;
  }

  .ocr-large-icon {
    width: 48px;
    height: 48px;
    color: var(--accent-blue);
    margin: 20px 0;
  }

  .ocr-scan-container {
    position: relative;
    width: 100px;
    height: 100px;
    margin: 0 auto 16px;
    border: 2px dashed var(--border-color);
    border-radius: var(--radius-md);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .ocr-scan-line {
    position: absolute;
    width: 100%;
    height: 3px;
    background-color: var(--accent-blue);
    opacity: 0.7;
    animation: scan 2s linear infinite;
  }

  @keyframes scan {
    0% { top: 0%; }
    50% { top: 100%; }
    100% { top: 0%; }
  }

  /* 空状態、ローディング */
  .empty-state {
    text-align: center;
    color: var(--text-secondary);
    padding: 40px;
    font-size: 0.9rem;
  }

  /* 日付スライダーUI */
  .date-slider-wrapper {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px;
    align-items: stretch;
    margin-top: 4px;
    width: 100%;
    max-width: 100%;
  }

  .date-slider {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 4px 0;
    width: 100%;
    min-width: 0;
    -ms-overflow-style: none;  /* IE and Edge */
    scrollbar-width: none;  /* Firefox */
  }

  .date-slider::-webkit-scrollbar {
    display: none; /* Chrome, Safari and Opera */
  }

  .date-card {
    flex: 0 0 54px; /* 固定幅 */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-color: var(--bg-input);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    padding: 6px 4px;
    cursor: pointer;
    transition: var(--transition-fast);
    user-select: none;
  }

  .date-card:hover {
    background-color: var(--bg-hover);
    border-color: var(--border-calc-btn);
  }

  .date-card.selected {
    background-color: rgba(46, 170, 220, 0.12);
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    font-weight: 500;
  }

  .date-card-month {
    font-size: 0.65rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .date-card.selected .date-card-month {
    color: var(--accent-blue);
  }

  .date-card-day {
    font-size: 1.1rem;
    font-weight: 600;
    font-family: 'Outfit', sans-serif;
    line-height: 1.1;
  }

  .date-card-weekday {
    font-size: 0.65rem;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .date-card.selected .date-card-weekday {
    color: var(--accent-blue);
  }

  /* 土曜日曜のカラーアクセント */
  .date-card-sat {
    color: #4dabf7 !important;
  }
  .date-card-sun {
    color: #ff8787 !important;
  }

  .date-picker-trigger-wrapper {
    position: relative;
    width: 54px;
    height: 54px;
    align-self: center;
    display: flex;
  }

  .date-picker-trigger {
    width: 100%;
    height: 100%;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-md);
  }

  .date-picker-trigger i {
    width: 18px;
    height: 18px;
  }

  /* オリジナルカレンダーポップアップ */
  .custom-calendar-popup {
    position: absolute;
    left: 0;
    top: calc(100% + 8px);
    width: 280px;
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-popup);
    padding: 16px;
    z-index: 100;
    display: none;
    flex-direction: column;
    gap: 12px;
  }

  .custom-calendar-popup.active {
    display: flex;
    animation: calendarFadeIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes calendarFadeIn {
    from {
      opacity: 0;
      transform: translateY(4px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
    font-weight: 600;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .calendar-nav-btn {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: var(--radius-sm);
    transition: var(--transition-fast);
  }

  .calendar-nav-btn:disabled {
    cursor: not-allowed !important;
    opacity: 0.15 !important;
    pointer-events: none !important;
  }

  .calendar-nav-btn:hover:not(:disabled) {
    background-color: var(--bg-hover);
    color: var(--text-primary);
  }

  .calendar-nav-btn i {
    width: 16px;
    height: 16px;
  }

  .calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .calendar-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .calendar-day-cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    border-radius: 50%;
    cursor: pointer;
    transition: var(--transition-fast);
    user-select: none;
    color: var(--text-primary);
  }

  .calendar-day-cell:hover:not(.empty-cell) {
    background-color: var(--bg-hover);
  }

  .calendar-day-cell.other-month {
    color: var(--text-muted);
  }

  .calendar-day-cell.future-date {
    color: var(--text-muted) !important;
    opacity: 0.6;
  }

  .calendar-day-cell.today {
    border: 1px solid var(--accent-blue);
    color: var(--accent-blue);
    font-weight: 600;
  }

  .calendar-day-cell.selected {
    background-color: var(--accent-blue) !important;
    color: #fff !important;
    font-weight: 600;
  }

  .calendar-day-cell.empty-cell {
    cursor: default;
    pointer-events: none;
  }

  .calendar-day-cell.sat {
    color: var(--text-sat);
  }

  .calendar-day-cell.sun {
    color: var(--text-sun);
  }
  
  .calendar-day-cell.selected.sat,
  .calendar-day-cell.selected.sun {
    color: #fff !important;
  }

  /* ビュー切り替えタブ */
  .view-tabs {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 8px;
  }

  .view-tab {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    position: relative;
    transition: var(--transition-fast);
  }

  .view-tab:hover {
    color: var(--text-primary);
    background-color: rgba(255, 255, 255, 0.03);
  }

  .view-tab.active {
    color: var(--accent-blue);
    font-weight: 600;
  }

  .view-tab.active::after {
    content: '';
    position: absolute;
    bottom: -9px;
    left: 0;
    width: 100%;
    height: 2px;
    background-color: var(--accent-blue);
  }

  /* ビューコンテンツの表示/非表示 */
  .view-content {
    display: none;
    width: 100%;
  }

  .view-content.active {
    display: block;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* 年間ダッシュボードのレイアウト */
  .yearly-dashboard-wrapper {
    display: flex;
    flex-direction: column;
    gap: 24px;
    width: 100%;
  }

  .yearly-header {
    display: flex;
    justify-content: flex-start;
    align-items: center;
  }

  .year-selector-wrapper {
    display: flex;
    align-items: center;
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    padding: 4px;
  }

  .year-display {
    font-size: 1rem;
    font-weight: 600;
    padding: 0 16px;
    min-width: 90px;
    text-align: center;
  }

  .yearly-stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }

  .yearly-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }

  @media (max-width: 1024px) {
    .yearly-grid {
      grid-template-columns: 1fr;
    }
  }

  .yearly-charts-col,
  .yearly-tables-col {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .yearly-trend-chart-container {
    height: 320px;
  }

  /* ユーティリティ */
  .text-blue { color: var(--accent-blue); }
  .text-purple { color: var(--accent-purple); }
  .text-right { text-align: right; }

  /* ==========================================
   * レスポンシブ対応 (Mobile / Tablet)
   * ========================================== */

  /* グリッド/フレックスのサイズ崩れ防止用のmin-widthクリア */
  .app-main,
  .dashboard-section,
  .ledger-section,
  .panel-card,
  .yearly-grid,
  .yearly-charts-col,
  .yearly-tables-col,
  .yearly-dashboard-wrapper {
    min-width: 0;
  }

  @media (max-width: 768px) {
    .app-container {
      padding: 16px;
    }
    
    .panel-card {
      padding: 16px;
    }
    
    .form-row {
      flex-direction: column;
      gap: 12px;
    }
    
    .col-6 {
      width: 100%;
      width: 50%; /* fallback reset, but flex-direction will handle layout */
    }
    
    .form-group.col-6 {
      width: 100%;
    }
  }

  @media (max-width: 480px) {
    .app-container {
      padding: 12px;
    }
    
    .app-header {
      align-items: center;
      gap: 12px;
    }
    
    .header-controls {
      gap: 8px;
    }
    
    .panel-card {
      padding: 12px;
    }
    
    .stats-grid {
      grid-template-columns: 1fr;
      gap: 12px;
    }
    
    .view-tabs {
      gap: 8px;
    }
    
    .view-tab {
      font-size: 0.9rem;
      padding: 6px 8px;
      gap: 4px;
    }
  }

  /* ==========================================
   * 電卓機能 (Calculator Widget)
   * ========================================== */
  .amount-input-wrapper {
    position: relative;
    display: flex;
    gap: 8px;
    align-items: stretch;
  }

  .calculator-trigger {
    flex: 0 0 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .calculator-trigger i {
    width: 18px;
    height: 18px;
  }

  .calculator-popup {
    position: absolute;
    right: 0;
    top: calc(100% + 8px);
    width: 240px;
    background-color: #202020;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    padding: 12px;
    z-index: 100;
    display: none;
    flex-direction: column;
    gap: 8px;
  }

  .calculator-popup.active {
    display: flex;
    animation: calcFadeIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes calcFadeIn {
    from {
      opacity: 0;
      transform: translateY(4px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .calc-display-area {
    background-color: var(--bg-input);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    padding: 8px;
    text-align: right;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 52px;
  }

  .calc-expression {
    font-size: 0.75rem;
    color: var(--text-secondary);
    min-height: 14px;
    word-break: break-all;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .calc-result {
    font-size: 1.1rem;
    font-weight: 600;
    font-family: 'Outfit', sans-serif;
    color: var(--text-primary);
    word-break: break-all;
  }

  .calc-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .calc-btn {
    background-color: var(--bg-input);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    border-radius: var(--radius-sm);
    height: 36px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition-fast);
    user-select: none;
  }

  .calc-btn:hover {
    background-color: var(--bg-hover);
    border-color: var(--border-calc-btn);
  }

  .calc-btn.op {
    background-color: var(--bg-calc-btn);
    font-weight: 600;
  }

  .calc-btn.op:hover {
    background-color: var(--bg-calc-btn-hover);
  }

  .calc-btn.tax-btn {
    background-color: rgba(46, 170, 220, 0.1);
    color: var(--accent-blue);
    border-color: rgba(46, 170, 220, 0.15);
    font-size: 0.75rem;
    font-weight: 600;
  }

  .calc-btn.tax-btn:hover {
    background-color: rgba(46, 170, 220, 0.2);
  }

  .calc-footer {
    display: flex;
    justify-content: space-between;
  }

  /* ==========================================
     Monthly Settlement Status Styles (flat-style)
     ========================================== */
  .settlement-status-container {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border-color);
  }

  /* アコーディオン精算ログ */
  .settlement-accordion-item {
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    background: rgba(255, 255, 255, 0.01);
    overflow: hidden;
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  .settlement-accordion-item:hover {
    background: rgba(255, 255, 255, 0.03);
    border-color: rgba(255, 255, 255, 0.15);
  }

  .settlement-accordion-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    font-size: 0.85rem;
    gap: 8px;
  }

  .settlement-accordion-summary {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-grow: 1;
    font-weight: 500;
    color: var(--text-primary);
  }

  .settlement-accordion-amount {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    margin-left: auto;
  }

  .settlement-accordion-chevron {
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease;
    color: var(--text-disabled);
  }

  .settlement-accordion-chevron i {
    width: 16px;
    height: 16px;
  }

  .settlement-accordion-item.active .settlement-accordion-chevron {
    transform: rotate(180deg);
  }

  .settlement-accordion-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease-out;
    background: rgba(0, 0, 0, 0.15);
  }

  .settlement-accordion-item.active .settlement-accordion-content {
    max-height: 500px;
  }

  .settlement-accordion-body {
    padding: 12px 14px;
    border-top: 1px solid var(--border-color);
  }

  .settlement-status-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .settlement-status-title {
    font-size: 1.1rem;
    font-weight: 700;
    font-family: 'Outfit', sans-serif;
  }

  .summary-properties {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .property-row {
    display: flex;
    align-items: flex-start;
    font-size: 0.85rem;
    line-height: 1.5;
    min-height: 24px;
  }

  .property-label {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 120px;
    flex-shrink: 0;
    color: var(--text-secondary);
    font-weight: 500;
    padding-top: 2px;
  }

  .property-label i {
    width: 14px;
    height: 14px;
    color: var(--text-disabled);
  }

  .property-value {
    color: var(--text-primary);
    flex-grow: 1;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
  }

  .property-value-text {
    font-weight: 400;
    word-break: break-all;
  }

  .property-value-amount {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
  }

  /* ステータスバッジ */
  .badge-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .badge-status-unpaid {
    background-color: rgba(148, 163, 184, 0.12);
    color: var(--text-secondary);
    border: 1px solid rgba(148, 163, 184, 0.2);
  }

  .badge-status-paid {
    background-color: rgba(55, 178, 77, 0.12);
    color: #51cf66;
    border: 1px solid rgba(55, 178, 77, 0.2);
  }

  .badge-status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .badge-status-unpaid .badge-status-dot {
